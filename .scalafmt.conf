version = "3.11.1"
runner.dialect = scala3

maxColumn    = 120
align.preset = some

project.git = true

rewrite.rules = [Imports, SortModifiers]
rewrite.imports {
  # ascii: matches IntelliJ Scala plugin ordering (grouped imports sort after single-name imports from the same parent)
  # scalastyle: sorts by first element of grouped import, changes ordering vs IntelliJ
  sort = ascii
  # Groups: (1) project + third-party, (2) java/scala stdlib
  # Note: patterns within a group are OR'd — an import lands in the first group where any pattern matches
  groups = [
    ["(?!(java|scala)\\.).*"],
    ["(java|scala)\\..*"]
  ]
}
rewrite.trailingCommas.style = keep
newlines.implicitParamListModifierForce = [before]
# Project convention: override first, then access modifier (private/protected), then other modifiers
# Default scalafmt order puts implicit/final before private, which diverges from existing code
rewrite.sortModifiers.order = [override, private, protected, implicit, final, sealed, abstract, lazy, open, transparent, inline, infix, opaque]

danglingParentheses.defnSite = true
danglingParentheses.ctrlSite = false
danglingParentheses.callSite = true
align.closeParenSite = true
newlines.topLevelStatementBlankLines = [
  {
    minBreaks = 2
    blanks = 1
  }
]

assumeStandardLibraryStripMargin = true
align.stripMargin = true

docstrings.style = keep

fileOverride {
  "glob:**/audit/src/**/*.scala" {
    runner.dialect = scala213
  }
}

# Custom self-hosted runner labels used by CI (Ubicloud for Linux; Windows uses GitHub-hosted).
# Registering them here silences actionlint's "unknown label" false positives.
self-hosted-runner:
  labels:
    - ubicloud-standard-2       # 2 vCPU /  8 GB
    - ubicloud-standard-4       # 4 vCPU / 16 GB  ← the "16GB runtime" target
    - ubicloud-standard-8       # 8 vCPU / 32 GB  (IT sharding experiments)
    - ubicloud-premium-4        # 4 vCPU / 16 GB premium (~2x CPU)

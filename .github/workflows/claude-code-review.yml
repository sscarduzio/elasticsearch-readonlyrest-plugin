name: Claude Code Review

# Automated PR review by Claude Code. Opt-in: fires only when the head commit message
# contains "@claude review". External-fork PRs are skipped (prompt-injection guard).
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: >-
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'MEMBER'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write # required for OIDC token exchange with the Anthropic backend
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Review is opt-in: run only when the PR's head commit message asks for it.
      - name: Gate on "@claude review" in head commit message
        id: gate
        run: |
          MSG=$(git log -1 --format=%B ${{ github.event.pull_request.head.sha }} 2>/dev/null || true)
          if printf '%s' "$MSG" | grep -qiF '@claude review'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Head commit message lacks '@claude review' — skipping review."
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.gate.outputs.run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Direct prompt (not the marketplace `/code-review` plugin) so we can enforce
          # the methodology in the `ror-pr-review` skill instead of being constrained by
          # a plugin template that under-fires on substantial PRs.
          #
          # Tooling intentionally broad: gh for PR/CI introspection, scala-cli/node for
          # empirical verification, file-reading tools so the bot can cross-reference
          # call sites — without these the bot can only summarise the diff, which is
          # what produced the "No issues found" non-reviews.
          claude_args: |
            --allowedTools "Bash(gh:*),Bash(scala-cli:*),Bash(node:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(git blame:*),Read,Grep,Glob,Skill"
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            **Step 1 — load the methodology.** Invoke the `ror-pr-review` skill
            (`.claude/skills/ror-pr-review/SKILL.md`). It defines the binding review
            methodology, hunt list, project-convention checklist, and output format.
            Also read `CLAUDE.md` for project conventions.

            **Step 2 — gather context.** Run, at minimum:
              - `gh pr view ${{ github.event.pull_request.number }} --json title,body,author,baseRefName,headRefName,additions,deletions,changedFiles,commits`
              - `gh pr diff ${{ github.event.pull_request.number }}`
              - `gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments`
              - `gh pr checks ${{ github.event.pull_request.number }}` — and for any failing check, resolve the run-id with `gh run list --branch ${{ github.event.pull_request.head.ref }} --json databaseId,conclusion,status,headSha --limit 20`, then fetch logs with `gh run view <run-id> --log-failed`
              - `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews` — to see prior reviews so you don't repeat or contradict them

            **Step 3 — review.** Apply the methodology from the `ror-pr-review` skill.
            Use `Read` on each changed file (not just the hunks). Use `Grep`/`grep -rn`
            to cross-reference callers, and to verify cross-ES-module consistency: when
            a change touches `es{N}x/`, grep for the same file path in sibling `es{M}x/`
            modules to check whether the fix needs to be replicated. If the diff includes
            a regex, parser, or other testable artifact, run it empirically with `node -e`
            or `scala-cli` (see the "What to actively hunt for" section in the skill).

            **Step 4 — post the review** using `gh pr comment ${{ github.event.pull_request.number }} --body-file <path>`.
            Format strictly per the "Output format" section of the skill — BE CONCISE:
            findings only (severity, `file:line`, what to change, why in 1–2 sentences),
            open questions only if they'd change a finding, and a HARD CAP of ~30 lines /
            ~350 words for the whole review. No audit-trail narrative, no praise section.

            **Hard rule:** never a bare `"No issues found"` — the no-issues form is ONE
            line naming the 3–5 highest-risk things you verified.

            **Hard rule:** if you hit an obstacle (tool error, file too large, ambiguous
            code), say so explicitly in the review. Never silently skip.
          show_full_output: true

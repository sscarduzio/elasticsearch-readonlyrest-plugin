readonlyrest:

  access_control_rules:

    # ES container initializer need this rule to configure ES instance after startup
    - name: "CONTAINER ADMIN"
      verbosity: error
      type: allow
      auth_key: admin:container

    - name: "User 1 - index1"
      filter: '{"query_string":{"query":"app:(cste)"}}'
      users: ["user1"]
      groups: [group2, group3]

    - name: "User 1 - index2"
      users: ["user1"]
      groups: [group2, group1]

    - name: "User 2 - allow"
      type: allow
      users: ["user2"]
      groups: [group2, group3]
      kibana:
        access: ro
        index: "user2_kibana_index"
        hide_apps: ["user2_app1", "user2_app2", "/^Analytics\\|(?!(Maps)$).*$/"]
        allowed_api_paths:
          - "^/api/spaces/.*$"
          - http_method: GET
            http_path: "/api/spaces?test=12.2"
        metadata:
          a: 1
          b: true
          c: "text"
          d: [ "a","b" ]
          e:
            f: 1
          g: ~

    - name: "User 2 - forbid"
      type: forbid
      users: ["user2"]
      groups: [group4]

    - name: "User 3"
      auth_key: "user3:pass"
      kibana:
        access: unrestricted
        index: "user3_kibana_index"
        hide_apps: ["user3_app1", "user3_app2"]

    - name: "User 4 - index1"
      users: ["user4"]
      groups: [group5]
      kibana:
        access: unrestricted
        index: "user4_group5_kibana_index"

    - name: "User 4 - index2"
      users: ["user4"]
      groups: [group6]
      kibana:
        access: unrestricted
        index: "user4_group6_kibana_index"
        template_index: "user4_group6_kibana_template_index"

    - name: "User 5 - forbid"
      type:
        policy: forbid
        response_message: "you are unauthorized to access this resource"
      users: ["user5"]
      groups: [group7]

    - name: "User 6 - multi-group with current_group variable"
      users: ["user6"]
      groups: [group8, group9]
      kibana:
        access: unrestricted
        index: "user6_@{acl:current_group}_kibana_index"
        template_index: "user6_@{acl:current_group}_kibana_template_index"

    - name: "User 7 - no explicit kibana index"
      users: ["user7"]
      groups: [group10]
      kibana:
        access: unrestricted

    - name: "User 7 - group11 specific"
      users: ["user7"]
      groups_or: [group11]
      kibana:
        access: rw
        index: "user7_@{acl:current_group}_kibana_index"

    - name: "User 7 - group12 specific"
      users: ["user7"]
      groups_or: [group12]
      kibana:
        access: rw
        index: "user7_@{acl:current_group}_kibana_index"

    - name: "User 8 - wildcard groups with current_group variable"
      users: ["user8"]
      groups: ["*"]
      kibana:
        access: unrestricted
        index: "user8_@{acl:current_group}_kibana_index"
        hide_apps: ["user8_app1"]

  users:
    - username: user1
      groups: ["group1", "group3"]
      auth_key: "user1:pass"

    - username: user2
      groups: ["group2", "group4"]
      auth_key: "user2:pass"

    - username: user4
      groups:
        - id: group5
          name: "Group 5"
        - id: group6
          name: "Group 6"
      auth_key: "user4:pass"

    - username: user5
      groups: ["group7"]
      auth_key: user5:pass

    - username: user6
      groups: ["group8", "group9"]
      auth_key: "user6:pass"

    - username: user7
      groups: ["group10", "group11", "group12"]
      auth_key: "user7:pass"

    - username: user8
      groups: ["group13", "group14", "group15"]
      auth_key: "user8:pass"

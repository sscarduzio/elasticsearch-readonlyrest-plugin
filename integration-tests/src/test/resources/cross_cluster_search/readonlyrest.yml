readonlyrest:

  access_control_rules:

    # ES container initializer need this rule to configure ES instance after startup
    - name: "CONTAINER ADMIN"
      verbosity: error
      type: allow
      auth_key: admin:container

    - name: "Dev1 - some indices from local cluster and remote private2 cluster"
      indices: ["test1_index", "private2:test1_index", "test1_ds", "private2:test1_ds"]
      auth_key: dev1:test

    - name: "Dev2 - some indices from local cluster and remote private2 and other_cluster clusters"
      indices: ["test2_index", "other_cluster:test1_index", "private2:test_alias"]
      auth_key: dev2:test

    - name: "Dev3 - index patterns from local cluster and remote cluster"
      indices: ["metrics*", "private1:audit_*"]
      auth_key: dev3:test

    - name: "Dev4 cannot access some logs indices on local cluster and private* remote clusters"
      type: forbid
      auth_key: dev4:test
      indices:
        patterns: ["*-logs-*", "private*:*-logs-*"]
        must_involve_indices: true

    - name: "Dev4 can access other indices"
      type: allow
      auth_key: dev4:test

    - name: "Dev5 can access other xpack remote cluster"
      type: allow
      indices: ["xpack:xpack_cluster*"]
      auth_key: dev5:test

    - name: "Dev6 with access to all private* clusters"
      type: allow
      auth_key: dev6:test
      indices: [ "private*:*" ]

    - name: "Dev7 with access to nonexistingcluster cluster"
      type: allow
      auth_key: dev7:test
      indices: [ "*", "nonexistingcluster*:*" ]

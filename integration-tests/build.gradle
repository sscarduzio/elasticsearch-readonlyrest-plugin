plugins {
    id "readonlyrest.base-common-conventions"
}

repositories {
    maven { url 'https://repo.gradle.org/gradle/libs-releases' }
    maven { url 'https://jitpack.io' }
    maven { url 'https://artifacts.elastic.co/maven' }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    scalaCompilerPlugin {
        transitive = false
    }
}

tasks.withType(ScalaCompile).configureEach {
    // Use artifactView to safely access configuration files in Gradle 9.x
    def pluginFiles = configurations.scalaCompilerPlugin.incoming.artifactView {
        attributes { }
    }.files
    // Map plugin jars to -Xplugin parameter
    List<String> parameters = pluginFiles.collect { '-Xplugin:' + it.absolutePath }

    // Add whatever flags you typically add
    parameters += [
            "-feature",
            "-Xfatal-warnings",
            "-Wunused:implicits",
            "-Wunused:imports",
            "-Wunused:explicits",
            "-Wunused:strict-no-implicit-warn",
            "-Wunused:locals",
            "-Wunused:params",
            "-Wunused:privates",
            "-Wunused:nowarn",
    ]

    // Finally set the additionalParameters
    scalaCompileOptions.additionalParameters = parameters
}

sourceSets {
    test {
        resources {
            srcDirs += [
                    "$rootDir/tests-utils/src/main/resources"
            ]
        }
    }
}

test {
    systemProperty "project.dir", rootProject.projectDir
    enabled = project.hasProperty('esModule')
    if (enabled) {
        // Build the singleton ES image once up-front so parallel workers never build concurrently.
        dependsOn 'prebuildEsImage'
        def module = project.properties['esModule']
        systemProperty "esModule", module
        def explicitEsVersion = project.gradle.startParameter.projectProperties['esVersion']
        if (explicitEsVersion != null) { systemProperty "esVersion", explicitEsVersion }

        // SHARDING: each `integration-tests:test` invocation is ONE worker JVM with its OWN singleton
        // ES (separate process => separate AtomicReference latch => separate ES container). Running K
        // invocations over DISJOINT suite subsets is the only way to get K real fork JVMs on an agent:
        // Gradle's JUnit-Platform processor collects ALL classes and runs the Launcher ONCE per worker,
        // so maxParallelForks/forkEvery can't split the scalatest engine's single work unit
        // (gradle/gradle#8632). We partition the INPUT instead. Deterministic name-hash mod K:
        // stable, auto-balances, zero maintenance as suites are added. shardCount=1 => run everything.
        def shardCount = (project.findProperty('shardCount') ?: '1').toInteger()
        def shardIndex = (project.findProperty('shardIndex') ?: '0').toInteger()
        filter {
            if (shardCount > 1) {
                def matched = 0
                test.testClassesDirs.asFileTree.matching {
                    include 'tech/beshu/ror/integration/suites/**/*Suite.class'
                    exclude '**/*$*.class'   // skip nested/companion classes
                }.visit { fd ->
                    if (!fd.directory) {
                        def fqcn = fd.path.replace('/', '.').replaceAll(/\.class$/, '')
                        if (Math.floorMod(fqcn.hashCode(), shardCount) == shardIndex) {
                            includeTestsMatching fqcn
                            matched++
                        }
                    }
                }
                if (matched == 0) {
                    throw new GradleException("Shard ${shardIndex}/${shardCount} matched 0 suites — check shardCount/shardIndex.")
                }
                logger.quiet(">>> integration-tests shard ${shardIndex}/${shardCount}: ${matched} suites")
            } else {
                includeTestsMatching 'tech.beshu.ror.integration.suites.*'
            }
        }
        // Gradle-native test machinery (replaces maiflai's one-JVM runner); ScalaTest tags map to JUnit tags.
        useJUnitPlatform {
            includeEngines 'scalatest'
            excludeTags('tech.beshu.tags.ExcludeESModule.' + module, 'tech.beshu.tags.IgnoreOnWindows')
        }
        // Parallel-safety invariant: suites run SERIALLY within a worker JVM (they share one mutable
        // singleton ES); parallelism is across worker JVMs only (maxParallelForks). The scalatest
        // engine is a non-hierarchical single-threaded TestEngine, so junit.jupiter.execution.parallel.*
        // is a NO-OP here — setting it would give a false belief that in-JVM parallelism is on while the
        // singleton suites silently corrupt each other. Fail fast if anyone enables it.
        def parallelProp = System.getProperty('junit.jupiter.execution.parallel.enabled')
        if (parallelProp != null && parallelProp.toBoolean()) {
            throw new GradleException(
                "junit.jupiter.execution.parallel.enabled=true is unsupported for integration-tests: " +
                "the scalatest engine ignores it and the singleton ES requires serial-within-JVM execution. " +
                "Use -PshardCount/-PshardIndex to parallelise across separate worker JVMs instead.")
        }
    }
    outputs.upToDateWhen { false }
    // Live console output — native test execution is silent without this (same block as core's).
    testLogging {
        showStandardStreams = true
        exceptionFormat = 'full'
        events "standardOut", "started", "passed", "skipped", "failed"
    }
    // ALWAYS 1 worker JVM per invocation. maxParallelForks is intentionally NOT the parallelism lever:
    // Gradle's JUnit-Platform processor collects all classes into one Launcher run, so a 2nd fork never
    // gets work (gradle/gradle#8632) — verified 2026-06-19 (forks=2 -> still 1 test executor). Intra-
    // agent parallelism comes from running multiple SHARDED invocations (see -PshardCount above), each
    // its own JVM + own ES container. So here, exactly one.
    maxParallelForks = 1
    // Logged loud (quiet() survives -q) so the per-JVM fork count is never a mystery. Parallelism is
    // sharding (multiple invocations), not maxParallelForks — see the SHARDING note above.
    logger.quiet(">>> integration-tests maxParallelForks=${maxParallelForks} (1 ES/JVM; parallelism via -PshardCount)")
    // Per WORKER JVM (Gradle's 512m default is too small): 2g heap + ~1.2g ES container.
    maxHeapSize = '2g'
}

dependencies {
    testImplementation project(':tests-utils')

    testImplementation  group: 'jakarta.xml.bind',              name: 'jakarta.xml.bind-api',       version: '2.3.2'
    testImplementation  group: 'org.glassfish.jaxb',            name: 'jaxb-runtime',               version: '2.3.2'
    testImplementation  group: 'ch.qos.logback',                name: 'logback-classic',            version: '1.5.22'
    testRuntimeOnly     group: 'co.helmethair',                 name: 'scalatest-junit-runner',     version: '0.2.0'
    testRuntimeOnly     group: 'org.junit.platform',            name: 'junit-platform-launcher',    version: '1.10.2'
    testImplementation  group: 'org.scala-lang',                name: 'scala3-library_3',           version: '3.3.7'
    testImplementation  group: 'org.scalatest',                 name: 'scalatest_3',                version: '3.2.19'
}

tasks.register('ldapserver', JavaExec) {
    systemProperties = System.properties
    mainClass.set('tech.beshu.ror.integration.LDAPServer')
    classpath = sourceSets.test.runtimeClasspath
}

// Builds + stably tags the singleton ES image ONCE (single JVM) before the parallel `test` workers.
// Without this, workers build the identical image concurrently and the Docker build layers fail
// intermittently at IT_MAX_PARALLEL_FORKS>=3. Pre-building means every worker gets a cache hit.
tasks.register('prebuildEsImage', JavaExec) {
    onlyIf { project.hasProperty('esModule') }
    systemProperty 'project.dir', rootProject.projectDir
    if (project.hasProperty('esModule')) {
        systemProperty 'esModule', project.properties['esModule']
    }
    def explicitEsVersion = project.gradle.startParameter.projectProperties['esVersion']
    if (explicitEsVersion != null) { systemProperty 'esVersion', explicitEsVersion }
    mainClass.set('tech.beshu.ror.utils.containers.PrebuildSingletonEsImage')
    classpath = sourceSets.test.runtimeClasspath
}


plugins {
    id "readonlyrest.base-common-conventions"

    id 'java'
    id "java-library"
}

repositories {
    maven { url 'https://repo.gradle.org/gradle/libs-releases' }
    maven { url 'https://jitpack.io' }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

configurations {
    scalaCompilerPlugin {
        transitive = false
    }
}

tasks.withType(ScalaCompile).configureEach {
    // Map plugin jars to -Xplugin parameter
    List<String> parameters =
            configurations.scalaCompilerPlugin.files.collect {
                '-Xplugin:' + it.absolutePath
            }

    // Add whatever flags you typically add
    parameters += [
            "-feature",
            "-Xfatal-warnings",
            "-Wunused:implicits",
            "-Wunused:imports",
            "-Wunused:explicits",
            "-Wunused:strict-no-implicit-warn",
            "-Wunused:locals",
            "-Wunused:params",
            "-Wunused:privates",
            "-Wunused:nowarn"
    ]

    // Finally set the additionalParameters
    scalaCompileOptions.additionalParameters = parameters
}

dependencies {
    api group: 'com.github.pathikrit',           name: 'better-files_3',                    version: '3.9.2'
    api group: 'org.apache.commons',             name: 'commons-compress',                  version: '1.28.0'
    api group: 'commons-io',                     name: 'commons-io',                        version: '2.21.0'
    api group: 'org.apache.commons',             name: 'commons-lang3',                     version: '3.20.0'
    api group: 'org.apache.commons',             name: 'commons-text',                      version: '1.15.0'
    api group: 'dev.failsafe',                   name: 'failsafe',                          version: '3.3.2'
    api group: 'org.gradle',                     name: 'gradle-tooling-api',                version: '9.2.1'
    api group: 'com.google.code.gson',           name: 'gson',                              version: '2.13.2'
    api group: 'com.google.guava',               name: 'guava',                             version: '35.5.0-jre'
    api group: 'org.apache.httpcomponents',      name: 'httpclient',                        version: '4.5.14'
    api group: 'org.apache.logging.log4j',       name: 'log4j-1.2-api',                     version: '2.25.2'
    api group: 'org.apache.logging.log4j',       name: 'log4j-core',                        version: '2.25.2'
    api group: 'io.jsonwebtoken',                name: 'jjwt-api',                          version: '0.13.0'
    api group: 'io.jsonwebtoken',                name: 'jjwt-impl',                         version: '0.13.0'
    api group: 'io.jsonwebtoken',                name: 'jjwt-orgjson',                      version: '0.13.0'
    api group: 'org.jooq',                       name: 'joor',                              version: '0.9.15'
    api group: 'com.jayway.jsonpath',            name: 'json-path',                         version: '2.10.0'
    api group: 'io.monix',                       name: 'monix_3',                           version: '3.4.1'
    api group: 'com.lihaoyi',                    name: 'os-lib_3',                          version: '0.11.6'
    api group: 'eu.timepit',                     name: 'refined_3',                         version: '0.11.3'
    api group: 'org.scala-lang',                 name: 'scala3-library_3',                  version: '3.3.7'
    api group: 'org.scala-lang.modules'  ,       name: 'scala-parallel-collections_3',      version: '1.2.0'
    api group: 'com.typesafe.scala-logging',     name: 'scala-logging_3',                   version: '3.9.5'
    api group: 'org.scalatest',                  name: 'scalatest_3',                       version: '3.2.19'
    api group: 'com.dimafeng',                   name: 'testcontainers-scala-scalatest_3',  version: '0.44.0'
    api group: 'org.testcontainers',             name: 'testcontainers',                    version: "2.0.3"
    api group: 'eu.rekawek.toxiproxy',           name: 'toxiproxy-java',                    version: "2.1.11"
    api group: 'com.unboundid',                  name: 'unboundid-ldapsdk',                 version: '7.0.4'

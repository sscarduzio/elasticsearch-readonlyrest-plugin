#
# ROR-specific logging, merged with the stock ES `config/log4j2.properties`.
# ES recursively loads every file named `log4j2.properties` under the config dir and combines
# them into a single composite configuration, so this file only declares the extra loggers and
# must NOT redefine `status`, `rootLogger` or any appender (those come from the stock config).
# Loggers with just name+level log through the root appenders via additivity.
logger.ror.name = tech.beshu.ror
logger.ror.level = info
logger.ror_ldap.name = tech.beshu.ror.accesscontrol.blocks.definitions.ldap.implementations
logger.ror_ldap.level = debug

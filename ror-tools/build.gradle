buildscript {
    ext {
        esVersion = project.properties['esVersion'] ?: "unknown"
    }
}

plugins {
    id "readonlyrest.base-common-conventions"

    id "com.github.maiflai.scalatest"           version "0.33"
    id "com.gradleup.shadow"                    version "9.3.0"
}

repositories {
    maven { url 'https://repo.gradle.org/gradle/libs-releases' }
    maven { url 'https://jitpack.io' }
}

sourceSets {
    test {
        resources {
            srcDirs += [
                    "$rootDir/tests-utils/src/main/resources"
            ]
        }
    }
}

test {
    // Run tests with Java 21 (required by Gradle Tooling API used in tests, matches CI environment)
    javaLauncher = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(17) }
    
    systemProperty "project.dir", rootProject.projectDir
    enabled = project.hasProperty('esModule')
    if (enabled) {
        def module = project.properties['esModule']
        systemProperty "esModule", module
        def explicitEsVersion = project.gradle.startParameter.projectProperties['esVersion']
        if (explicitEsVersion != null) { systemProperty "esVersion", explicitEsVersion }
        tags {
            exclude 'tech.beshu.tags.ExcludeESModule.' + module
            exclude 'tech.beshu.tags.IgnoreOnWindows'
        }
        suite 'tech.beshu.ror.tools.*'
    }
    outputs.upToDateWhen { false }
    maxParallelForks = 1
}

configurations {
    shadowRuntime {
        extendsFrom runtimeClasspath
    }
}

dependencies {
    implementation project(path: ':ror-tools-core')
    implementation group: 'com.github.scopt',              name: 'scopt_3',                       version: '4.1.0'

    testImplementation(project(':tests-utils'))
    testImplementation group:  'ch.qos.logback',        name: 'logback-classic',  version: '1.5.22'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

compileScala {
    options.compilerArgs.addAll(
            "-feature",
            "-Xfatal-warnings",
            "-Wunused:implicits",
            "-Wunused:imports",
            "-Wunused:explicits",
            "-Wunused:strict-no-implicit-warn",
            "-Wunused:locals",
            "-Wunused:params",
            "-Wunused:privates",
            "-Wunused:nowarn",
    )
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.additionalParameters = ["-feature", "-Xfatal-warnings"]
}

shadowJar {
    minimize()
    manifest {
        attributes 'Main-Class': 'tech.beshu.ror.tools.RorToolsApp'
    }
    archiveFileName = "ror-tools.${getArchiveExtension().get()}"
    configurations = [project.configurations.shadowRuntime]
}

// Configure Auto Relocation
import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

tasks.named('shadowJar', ShadowJar) {
    enableAutoRelocation = true
    relocationPrefix = "tech.beshu.ror.tools"
}

tasks.withType(AbstractArchiveTask).configureEach {
    preserveFileTimestamps = false
    reproducibleFileOrder = true
}

def netty4TransportArtifactName = "transport-netty4-${esVersion}.jar"
def netty4TransportArtifactDestinationPath = "org/elasticsearch/plugin/transport-netty4/${esVersion}/"

def elasticsearchArtifactName = "elasticsearch-${esVersion}.jar"
def elasticsearchArtifactDestinationPath = "org/elasticsearch/elasticsearch/${esVersion}/"

tasks.register('uploadArtifactsFromEsBinaries') {
    dependsOn getArtifactsFromEsBinaries
    doLast {
        // These artifacts go to the *libs* store, not the artifacts store.
        // Select the LIBS store and provide its ROR_LIBS_STORE_* vars (falling back to sane defaults
        // for local runs where the CI secrets are absent).
        def libsStoreEnv = [
            'ROR_S3_TARGET_STORE'             : 'LIBS',
            'ROR_LIBS_STORE_ENDPOINT_URL'     : System.getenv('ROR_LIBS_STORE_ENDPOINT_URL') ?: 'https://dgp.serve.beshu.tech',
            'ROR_LIBS_STORE_ACCESS_KEY_ID'    : System.getenv('ROR_LIBS_STORE_ACCESS_KEY_ID') ?: '',
            'ROR_LIBS_STORE_ACCESS_KEY_SECRET': System.getenv('ROR_LIBS_STORE_ACCESS_KEY_SECRET') ?: '',
            'ROR_LIBS_STORE_BUCKET'           : System.getenv('ROR_LIBS_STORE_BUCKET') ?: 'beshu',
            'ROR_LIBS_STORE_REGION'           : System.getenv('ROR_LIBS_STORE_REGION') ?: 'us-east-1',
            'ROR_LIBS_STORE_PATH_PREFIX'      : System.getenv('ROR_LIBS_STORE_PATH_PREFIX') ?: 'ror/libs'
        ]
        def buildDir = layout.buildDirectory.get().asFile.path
        exec {
            environment libsStoreEnv
            commandLine '../ci/upload-files-to-s3.sh', "${buildDir}/${netty4TransportArtifactName}", netty4TransportArtifactDestinationPath
        }
        exec {
            environment libsStoreEnv
            commandLine '../ci/upload-files-to-s3.sh', "${buildDir}/${elasticsearchArtifactName}", elasticsearchArtifactDestinationPath
        }
    }
}

tasks.register('getArtifactsFromEsBinaries') {
    dependsOn downloadEsBinaries
    doLast {
        def esExtractedDir = new File(layout.buildDirectory.asFile.get(), "es-${esVersion}").path + "/elasticsearch-${esVersion}"
        def destPath = layout.buildDirectory

        def netty4TransportArtifactPath = "${esExtractedDir}/modules/transport-netty4/${netty4TransportArtifactName}"
        project.logger.info("Copying ${netty4TransportArtifactPath} to ${destPath.get().asFile.path} ...")
        copy {
            from netty4TransportArtifactPath
            into destPath
        }

        def esArtifactPath = "${esExtractedDir}/lib/${elasticsearchArtifactName}"
        project.logger.info("Copying ${esArtifactPath} to ${destPath.get().asFile.path} ...")
        copy {
            from esArtifactPath
            into destPath
        }
    }
}

tasks.register('downloadEsBinaries') {
    doLast {
        def esTar = new File(layout.buildDirectory.asFile.get(), "es-${esVersion}.tar.gz")
        if (!esTar.exists()) {
            if (!layout.buildDirectory.asFile.get().exists()) {
                project.mkdir(layout.buildDirectory.asFile.get())
            }
            def esLinuxBinaries = "elasticsearch-${esVersion}-linux-x86_64.tar.gz"
            project.logger.info("Downloading ${esLinuxBinaries} ...")
            new URL("https://artifacts.elastic.co/downloads/elasticsearch/${esLinuxBinaries}")
                    .withInputStream { i -> esTar.withOutputStream { it << i } }
        }
        def esDir = new File(layout.buildDirectory.asFile.get(), "es-${esVersion}")
        project.logger.info("Extracting ${esTar.path} to ${esDir.path} ...")
        copy {
            from tarTree(esTar)
            into esDir
        }
    }
}

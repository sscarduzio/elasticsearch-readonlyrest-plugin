buildscript {
    ext {
        esVersion = project.properties['esVersion'] ?: "unknown"
    }
}

plugins {
    id "readonlyrest.base-common-conventions"

    id "com.github.maiflai.scalatest"           version "0.33"
    id "com.gradleup.shadow"                    version "9.3.0"
}

repositories {
    maven { url 'https://repo.gradle.org/gradle/libs-releases' }
    maven { url 'https://jitpack.io' }
}

sourceSets {
    test {
        resources {
            srcDirs += [
                    "$rootDir/tests-utils/src/main/resources"
            ]
        }
    }
}

test {
    // Run tests with Java 21 (required by Gradle Tooling API used in tests, matches CI environment)
    javaLauncher = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(17) }
    
    systemProperty "project.dir", rootProject.projectDir
    enabled = project.hasProperty('esModule')
    if (enabled) {
        def module = project.properties['esModule']
        systemProperty "esModule", module
        def explicitEsVersion = project.gradle.startParameter.projectProperties['esVersion']
        if (explicitEsVersion != null) { systemProperty "esVersion", explicitEsVersion }
        tags {
            exclude 'tech.beshu.tags.ExcludeESModule.' + module
            exclude 'tech.beshu.tags.IgnoreOnWindows'
        }
        suite 'tech.beshu.ror.tools.*'
    }
    outputs.upToDateWhen { false }
    maxParallelForks = 1
}

configurations {
    shadowRuntime {
        extendsFrom runtimeClasspath
    }
}

dependencies {
    implementation project(path: ':ror-tools-core')
    implementation group: 'com.github.scopt',              name: 'scopt_3',                       version: '4.1.0'

    testImplementation(project(':tests-utils'))
    testImplementation group:  'ch.qos.logback',        name: 'logback-classic',  version: '1.5.22'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}

compileScala {
    options.compilerArgs.addAll(
            "-feature",
            "-Xfatal-warnings",
            "-Wunused:implicits",
            "-Wunused:imports",
            "-Wunused:explicits",
            "-Wunused:strict-no-implicit-warn",
            "-Wunused:locals",
            "-Wunused:params",
            "-Wunused:privates",
            "-Wunused:nowarn",
    )
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.additionalParameters = ["-feature", "-Xfatal-warnings"]
}

shadowJar {
    minimize()
    manifest {
        attributes 'Main-Class': 'tech.beshu.ror.tools.RorToolsApp'
    }
    archiveFileName = "ror-tools.${getArchiveExtension().get()}"
    configurations = [project.configurations.shadowRuntime]
}

// Configure Auto Relocation
import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

tasks.named('shadowJar', ShadowJar) {
    enableAutoRelocation = true
    relocationPrefix = "tech.beshu.ror.tools"
}

tasks.withType(AbstractArchiveTask).configureEach {
    preserveFileTimestamps = false
    reproducibleFileOrder = true
}

def netty4TransportArtifactName = "transport-netty4-" + esVersion + ".jar"
def netty4TransportArtifactDestinationPath = "org/elasticsearch/plugin/transport-netty4/" + esVersion + "/" + netty4TransportArtifactName

tasks.register('uploadArtifactsFromEsBinaries', Exec) {
    environment 'ROR_ARTIFACTS_STORE_ENDPOINT_URL', System.getenv('ROR_LIBS_STORE_URL') ?: 'https://dgp.serve.beshu.tech'
    environment 'ROR_ARTIFACTS_STORE_ACCESS_KEY_ID', System.getenv('ROR_LIBS_STORE_ACCESS_KEY_ID') ?: ''
    environment 'ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET', System.getenv('ROR_LIBS_STORE_ACCESS_KEY_SECRET') ?: ''
    environment 'ROR_ARTIFACTS_STORE_BUCKET', System.getenv('BUCKET') ?: 'beshu'
    environment 'ROR_ARTIFACTS_STORE_PATH_PREFIX', ''
    commandLine '../ci/upload-files-to-s3.sh', layout.buildDirectory.get().asFile.path + "/" + netty4TransportArtifactName, "ror/libs/" + netty4TransportArtifactDestinationPath
}

tasks.register('getArtifactsFromEsBinaries') {
    doLast {
        def esDir = new File(layout.buildDirectory.asFile.get(), "es-" + esVersion)
        def netty4TransportArtifactPath = esDir.path + "/elasticsearch-" + esVersion + "/modules/transport-netty4/" + netty4TransportArtifactName
        def netty4TransportDestPath = layout.buildDirectory
        project.logger.info("Coping " + netty4TransportArtifactPath + " to " + netty4TransportDestPath.get().asFile.path + " ...")
        copy {
            from netty4TransportArtifactPath
            into netty4TransportDestPath
        }
    }
}

uploadArtifactsFromEsBinaries.dependsOn getArtifactsFromEsBinaries

tasks.register('downloadEsBinaries') {
    doLast {
        def esTar = new File(layout.buildDirectory.asFile.get(), "es-" + esVersion + ".tar.gz")
        if (!esTar.exists()) {
            if (!layout.buildDirectory.asFile.get().exists()) {
                project.mkdir(layout.buildDirectory.asFile.get())
            }
            def esLinuxBinaries = "elasticsearch-" + esVersion + "-linux-x86_64.tar.gz"
            def url = new URL("https://artifacts.elastic.co/downloads/elasticsearch/" + esLinuxBinaries)
            // Download to a temp file and only rename into place on success, so an interrupted
            // download never leaves a truncated *.tar.gz that the (!esTar.exists()) guard would later
            // reuse — that surfaced as "EOFException: Unexpected end of ZLIB input stream" at extraction.
            // Retry a few times to ride out transient network failures against artifacts.elastic.co.
            def maxAttempts = 3
            for (int attempt = 1; ; attempt++) {
                def tmpTar = new File(esTar.parentFile, esTar.name + ".part")
                tmpTar.delete()
                try {
                    project.logger.info("Downloading " + esLinuxBinaries + " (attempt " + attempt + "/" + maxAttempts + ") ...")
                    def conn = url.openConnection()
                    conn.instanceFollowRedirects = true
                    conn.connectTimeout = 30_000
                    conn.readTimeout = 120_000
                    def expectedLength = conn.contentLengthLong
                    conn.inputStream.withStream { i -> tmpTar.withOutputStream { it << i } }
                    if (expectedLength >= 0 && tmpTar.length() != expectedLength) {
                        throw new GradleException("Incomplete download: got " + tmpTar.length() + " bytes, expected " + expectedLength)
                    }
                    java.nio.file.Files.move(tmpTar.toPath(), esTar.toPath(),
                            java.nio.file.StandardCopyOption.REPLACE_EXISTING, java.nio.file.StandardCopyOption.ATOMIC_MOVE)
                    break
                } catch (Exception e) {
                    tmpTar.delete()
                    if (attempt >= maxAttempts) {
                        throw new GradleException("Failed to download " + esLinuxBinaries + " after " + maxAttempts + " attempts", e)
                    }
                    project.logger.warn("Download of " + esLinuxBinaries + " failed (attempt " + attempt + "/" + maxAttempts + "): " + e.message + " — retrying")
                }
            }
        }
        def esDir = new File(layout.buildDirectory.asFile.get(), "es-" + esVersion)
        project.logger.info("Extracting " + esTar.path + " to " + esDir.path + "...")
        copy {
            from tarTree(esTar)
            into esDir
        }
    }
}

getArtifactsFromEsBinaries.dependsOn downloadEsBinaries


steps:
  # NOTE: IT legs run on the self-hosted 'Default' pool, where the Docker daemon is SHARED across all
  # agents on the host. An unqualified `docker system prune -af` here would destroy a sibling leg's
  # in-flight ES containers. So we only ever touch THIS leg's own resources, scoped by the unique
  # ROR_LEG_ID label (stamped onto every container in EsContainer.scala). Dangling-image/builder prune
  # is daemon-wide but safe (it can't remove images/layers an in-use container references).
  - bash: |
      echo ">>> reaping any leftover containers for THIS leg id ($ROR_LEG_ID) before start"
      ids=$(docker ps -aq --filter "label=ror.leg=$ROR_LEG_ID" 2>/dev/null)
      [ -n "$ids" ] && docker rm -f $ids || echo "none"
      # Reclaim disk: leaked ror-it-es:<hash> images are TAGGED so plain dangling-prune misses them and
      # they fill /home (agents hit 100% -> "No space left on device" fails every leg). Prune images
      # UNUSED by a running container + older than 180m (> longest leg, so a sibling's in-flight image
      # is never removed). Safe on the shared daemon.
      docker image prune -af --filter "until=180m" >/dev/null 2>&1 || true
      docker image prune -f >/dev/null 2>&1 || true
      docker builder prune -f >/dev/null 2>&1 || true
      df -h /
    displayName: 'Pre-clean this leg''s Docker leftovers (shared-daemon safe)'
    env:
      ROR_LEG_ID: $(Build.BuildId)-$(System.JobId)
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - script: |
      export ROR_LIBS_STORE_URL=$VAR_ROR_LIBS_STORE_URL
      export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
      export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET

      echo "[TEST] executing ROR_TASK = $ROR_TASK"
      ci/run-pipeline.sh
    env:
      GRADLE_USER_HOME: $(GRADLE_USER_HOME)
      ROR_LEG_ID: $(Build.BuildId)-$(System.JobId)
      # Intra-agent parallelism: K sharded integration-tests:test JVMs, each its own ES container,
      # running disjoint suite subsets. Default 1 (no sharding). Override per-run via the IT_SHARD_COUNT
      # pipeline variable. MUST be declared here — Azure scrubs step env to declared vars (a bare
      # agent .env is NOT forwarded into steps). Gate >1 only on agents with RAM for K ES instances.
      IT_SHARD_COUNT: $(IT_SHARD_COUNT)
      VAR_ROR_LIBS_STORE_URL: $(ROR_LIBS_STORE_URL)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)

  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "$(ROR_TASK) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

  # Reap THIS leg's containers no matter how the job ended (success / failure / cancellation). Azure
  # runs always() steps within the cancel grace period, so this catches the common supersede-cancel
  # case. The Abandoned case (agent lost contact, no step runs) is covered by the host timer:
  # ci/reap-orphan-es-containers.sh on each agent. Scoped by label -> never touches a sibling leg.
  - bash: |
      echo ">>> reaping THIS leg's containers ($ROR_LEG_ID) on exit"
      ids=$(docker ps -aq --filter "label=ror.leg=$ROR_LEG_ID" 2>/dev/null)
      if [ -n "$ids" ]; then docker rm -f $ids; else echo "no leftover containers for $ROR_LEG_ID"; fi
    displayName: 'Reap this leg''s containers (always)'
    condition: always()
    env:
      ROR_LEG_ID: $(Build.BuildId)-$(System.JobId)

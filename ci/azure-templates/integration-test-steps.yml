steps:
  # On the self-hosted ryzen pool the Docker daemon is SHARED, so we only touch THIS CI job's resources
  # (scoped by the ROR_CI_JOB_ID label); dangling-image/builder prune is daemon-wide but safe.
  - bash: |
      echo ">>> reaping any leftover containers for THIS CI job id ($ROR_CI_JOB_ID) before start"
      # Inline (not ci-lib.sh's reap_ci_job_containers) — runs BEFORE `checkout: self`, so ci-lib.sh
      # isn't on disk yet. Same label-scoped logic; keep in sync with ci-lib.
      ids=$(docker ps -aq --filter "label=ror.ci-job=$ROR_CI_JOB_ID" 2>/dev/null)
      [ -n "$ids" ] && docker rm -f $ids || echo "none"
      # Leaked ror-it-es:<hash> images are TAGGED (dangling-prune misses them) and fill disk. Prune
      # images unused + older than 180m (> longest CI job, so a sibling job's in-flight image is never removed).
      docker image prune -af --filter "until=180m" >/dev/null 2>&1 || true
      docker image prune -f >/dev/null 2>&1 || true
      docker builder prune -f >/dev/null 2>&1 || true
      df -h /
    displayName: 'Pre-clean this leg''s Docker leftovers (shared-daemon safe)'
    env:
      ROR_CI_JOB_ID: $(Build.BuildId)-$(System.JobId)
      AGENT_ISSELFHOSTED: $(Agent.IsSelfHosted)

  # MUST run on the host (target: host), not in the container — else the `rm` runs in the container's
  # mount namespace and frees NOTHING on the VM disk (~16G of preinstalled toolchains). Hosted-only.
  - bash: |
      if [ "${AGENT_ISSELFHOSTED:-0}" != "1" ]; then
        echo ">>> [host] freeing preinstalled toolchains to fit ES image builds"
        df -h /
        sudo rm -rf \
          /usr/share/dotnet /usr/local/.ghcup /usr/share/swift \
          /usr/local/share/powershell /usr/local/julia* \
          /opt/microsoft /opt/az /usr/local/share/chromium \
          /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache 2>/dev/null || true
        echo ">>> [host] after reclaim:"; df -h /
      else
        echo ">>> self-hosted agent — skipping host toolchain reclaim (shared system dirs)"
      fi
    displayName: 'Free hosted-VM disk for ES image builds (HOST namespace)'
    target: host
    env:
      AGENT_ISSELFHOSTED: $(Agent.IsSelfHosted)
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - script: |
      export ROR_LIBS_STORE_ENDPOINT_URL=$VAR_ROR_LIBS_STORE_ENDPOINT_URL
      export ROR_LIBS_STORE_REGION=$VAR_ROR_LIBS_STORE_REGION
      export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
      export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET
      export ROR_LIBS_STORE_BUCKET=$VAR_ROR_LIBS_STORE_BUCKET
      export ROR_LIBS_STORE_PATH_PREFIX=$VAR_ROR_LIBS_STORE_PATH_PREFIX

      # Sourced in-process so DOCKER_AUTH_CONFIG reaches the testcontainers JVM when set, and stays
      # UNSET otherwise (an empty/literal Azure var would fail RegistryAuthLocator's JSON-parse).
      source ci/docker-hub-auth.sh

      echo "[TEST] executing ROR_TASK = $ROR_TASK"
      ci/run-pipeline.sh
    env:
      GRADLE_USER_HOME: $(GRADLE_USER_HOME)
      ROR_CI_JOB_ID: $(Build.BuildId)-$(System.JobId)
      # Intra-agent parallelism: K sharded test JVMs (each own ES), default 1. Must be declared here —
      # Azure scrubs step env to declared vars. Gate >1 only on agents with RAM for K ES instances.
      IT_PARALLELISM: $(IT_PARALLELISM)
      VAR_ROR_LIBS_STORE_ENDPOINT_URL: $(ROR_LIBS_STORE_ENDPOINT_URL)
      VAR_ROR_LIBS_STORE_REGION: $(ROR_LIBS_STORE_REGION)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
      VAR_ROR_LIBS_STORE_BUCKET: $(ROR_LIBS_STORE_BUCKET)
      VAR_ROR_LIBS_STORE_PATH_PREFIX: $(ROR_LIBS_STORE_PATH_PREFIX)
      DOCKER_HUB_USER: $(DOCKER_HUB_USER)
      DOCKER_HUB_RO_TOKEN: $(DOCKER_HUB_RO_TOKEN)

  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "$(ROR_TASK) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

  # Reap THIS CI job's containers however the job ended (always() runs in the cancel grace period);
  # the Abandoned case is covered by the host timer. Scoped by label -> never touches a sibling job CI job.
  - bash: |
      echo ">>> reaping THIS CI job's containers ($ROR_CI_JOB_ID) on exit"
      source ci/ci-lib.sh && reap_ci_job_containers   # single source of truth (ci-lib.sh)
    displayName: 'Reap this leg''s containers (always)'
    condition: always()
    env:
      ROR_CI_JOB_ID: $(Build.BuildId)-$(System.JobId)

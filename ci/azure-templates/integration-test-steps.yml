steps:
  # NOTE: Linux IT legs run on the HOSTED ubuntu pool by default (one fresh VM per leg, isolated
  # daemon). On the self-hosted ryzen pool, though, the Docker daemon is SHARED across agents on the
  # host, so an unqualified `docker system prune -af` would destroy a sibling leg's in-flight ES
  # containers. To stay correct on BOTH pools we only ever touch THIS leg's own resources, scoped by
  # the unique ROR_LEG_ID label (stamped onto every container in EsContainer.scala). Dangling-image/
  # builder prune is daemon-wide but safe (it can't remove images/layers an in-use container references).
  - bash: |
      echo ">>> reaping any leftover containers for THIS leg id ($ROR_LEG_ID) before start"
      # Inline (not ci-lib.sh's reap_leg_containers) — this step runs BEFORE `checkout: self`, so the
      # repo (and ci-lib.sh) isn't on disk yet. Same label-scoped logic; keep it in sync with ci-lib.
      ids=$(docker ps -aq --filter "label=ror.leg=$ROR_LEG_ID" 2>/dev/null)
      [ -n "$ids" ] && docker rm -f $ids || echo "none"
      # Reclaim disk: leaked ror-it-es:<hash> images are TAGGED so plain dangling-prune misses them and
      # they fill /home (agents hit 100% -> "No space left on device" fails every leg). Prune images
      # UNUSED by a running container + older than 180m (> longest leg, so a sibling's in-flight image
      # is never removed). Safe on the shared daemon.
      docker image prune -af --filter "until=180m" >/dev/null 2>&1 || true
      docker image prune -f >/dev/null 2>&1 || true
      docker builder prune -f >/dev/null 2>&1 || true
      df -h /
    displayName: 'Pre-clean this leg''s Docker leftovers (shared-daemon safe)'
    env:
      ROR_LEG_ID: $(Build.BuildId)-$(System.JobId)
      AGENT_ISSELFHOSTED: $(Agent.IsSelfHosted)

  # MUST run on the HOST (target: host), NOT in the ror-toolchains container. The IT job is a CONTAINER
  # job; a normal step's `rm` executes in the container's mount namespace where these host paths are
  # empty/absent → frees NOTHING on the VM disk that /var/lib/docker (the image-build target) lives on.
  # That was the bug: the reclaim ran in-container and the es80x-84x JDK-swap legs still hit "no space
  # left writing /tmp/custom-jdk.tar.gz" (~15.8GB free, unchanged). `target: host` runs it on the VM so
  # the deletes actually grow the overlay's filesystem. HOSTED ONLY — guarded off the self-hosted ryzen
  # pool where these are shared system dirs. List + sizes from the real probe (build 10540): dotnet 5.4G,
  # ghcup 3.8G, swift 3.4G, powershell 1.3G, julia 1.0G, microsoft+az+chromium ~2.1G ≈ 16G freed.
  - bash: |
      if [ "${AGENT_ISSELFHOSTED:-0}" != "1" ]; then
        echo ">>> [host] freeing preinstalled toolchains to fit ES image builds"
        df -h /
        sudo rm -rf \
          /usr/share/dotnet /usr/local/.ghcup /usr/share/swift \
          /usr/local/share/powershell /usr/local/julia* \
          /opt/microsoft /opt/az /usr/local/share/chromium \
          /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache 2>/dev/null || true
        echo ">>> [host] after reclaim:"; df -h /
      else
        echo ">>> self-hosted agent — skipping host toolchain reclaim (shared system dirs)"
      fi
    displayName: 'Free hosted-VM disk for ES image builds (HOST namespace)'
    target: host
    env:
      AGENT_ISSELFHOSTED: $(Agent.IsSelfHosted)
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - script: |
      export ROR_LIBS_STORE_URL=$VAR_ROR_LIBS_STORE_URL
      export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
      export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET

      echo "[TEST] executing ROR_TASK = $ROR_TASK"
      ci/run-pipeline.sh
    env:
      GRADLE_USER_HOME: $(GRADLE_USER_HOME)
      ROR_LEG_ID: $(Build.BuildId)-$(System.JobId)
      # Intra-agent parallelism: K sharded integration-tests:test JVMs, each its own ES container,
      # running disjoint suite subsets. Default 1 (no sharding). Override per-run via the IT_SHARD_COUNT
      # pipeline variable. MUST be declared here — Azure scrubs step env to declared vars (a bare
      # agent .env is NOT forwarded into steps). Gate >1 only on agents with RAM for K ES instances.
      IT_SHARD_COUNT: $(IT_SHARD_COUNT)
      VAR_ROR_LIBS_STORE_URL: $(ROR_LIBS_STORE_URL)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)

  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "$(ROR_TASK) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

  # Reap THIS leg's containers no matter how the job ended (success / failure / cancellation). Azure
  # runs always() steps within the cancel grace period, so this catches the common supersede-cancel
  # case. The Abandoned case (agent lost contact, no step runs) is covered by the host timer:
  # ci/reap-orphan-es-containers.sh on each agent. Scoped by label -> never touches a sibling leg.
  - bash: |
      echo ">>> reaping THIS leg's containers ($ROR_LEG_ID) on exit"
      source ci/ci-lib.sh && reap_leg_containers   # single source of truth (ci-lib.sh)
    displayName: 'Reap this leg''s containers (always)'
    condition: always()
    env:
      ROR_LEG_ID: $(Build.BuildId)-$(System.JobId)

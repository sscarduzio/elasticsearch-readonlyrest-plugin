steps:
  - bash: |
      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /usr/local/lib/android
      sudo rm -rf /opt/ghc
      sudo rm -rf /usr/local/.ghcup
      sudo rm -rf /usr/share/swift
      sudo rm -rf /usr/local/share/powershell
      sudo rm -rf /opt/hostedtoolcache
      sudo rm -rf /usr/share/rust
      sudo rm -rf /usr/share/miniconda
      sudo rm -rf /usr/local/share/chromium
      sudo rm -rf /usr/local/share/chrome_driver
      sudo rm -rf /opt/pipx
      docker system prune -af
      docker builder prune -af
      df -h /
    displayName: 'Free up disk space and clean Docker'
    target: host
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - task: Cache@2
    displayName: 'Restore Gradle cache'
    inputs:
      key: 'gradle | "$(Agent.OS)" | **/gradle/wrapper/gradle-wrapper.properties | **/settings.gradle* | **/build.gradle* | **/gradle.properties'
      restoreKeys: |
        gradle | "$(Agent.OS)"
        gradle
      path: $(GRADLE_USER_HOME)
      cacheHitVar: GRADLE_CACHE_HIT
  - script: |
      echo "[TEST] executing ROR_TASK = $ROR_TASK"
      ci/run-pipeline.sh
    env:
      GRADLE_USER_HOME: $(GRADLE_USER_HOME)
  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "$(ROR_TASK) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

steps:
  - bash: |
      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /usr/local/lib/android
      sudo rm -rf /opt/ghc
      sudo rm -rf /usr/local/.ghcup
      sudo rm -rf /usr/share/swift
      sudo rm -rf /usr/local/share/powershell
      sudo rm -rf /opt/hostedtoolcache
      sudo rm -rf /usr/share/rust
      sudo rm -rf /usr/share/miniconda
      sudo rm -rf /usr/local/share/chromium
      sudo rm -rf /usr/local/share/chrome_driver
      sudo rm -rf /opt/pipx
      docker system prune -af
      docker builder prune -af
      df -h /
    displayName: 'Free up disk space and clean Docker'
    target: host
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - script: |
      export ROR_LIBS_STORE_URL=$VAR_ROR_LIBS_STORE_URL
      export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
      export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET

      # Authenticated Docker Hub pulls (testcontainers/docker-java read DOCKER_AUTH_CONFIG):
      # avoids the per-IP anonymous rate limit shared across all Azure hosted agents.
      if [ -n "$VAR_DOCKER_HUB_RO_TOKEN" ] && [ -n "$VAR_DOCKER_HUB_USER" ]; then
        export DOCKER_AUTH_CONFIG="{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf '%s:%s' "$VAR_DOCKER_HUB_USER" "$VAR_DOCKER_HUB_RO_TOKEN" | base64 -w0)\"}}}"
        # DOCKER_AUTH_CONFIG embeds base64(user:token) and is a plain env var, not a pipeline secret,
        # so with the global system.debug:true the agent could surface it in verbose logs. Register it
        # for redaction in all subsequent log output (child JVMs still see the real env value).
        echo "##vso[task.setvariable variable=DOCKER_AUTH_CONFIG;isSecret=true]$DOCKER_AUTH_CONFIG"
        # Confirmation only — never echo DOCKER_AUTH_CONFIG itself (it embeds the base64 credential).
        echo "[TEST] Docker Hub authenticated pulls ENABLED (user '$VAR_DOCKER_HUB_USER')"
      else
        echo "[TEST] Docker Hub authenticated pulls DISABLED (anonymous, rate-limited) — DOCKER_HUB_USER/DOCKER_HUB_RO_TOKEN not both set"
      fi

      echo "[TEST] executing ROR_TASK = $ROR_TASK"
      ci/run-pipeline.sh
    env:
      GRADLE_USER_HOME: $(GRADLE_USER_HOME)
      VAR_ROR_LIBS_STORE_URL: $(ROR_LIBS_STORE_URL)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
      VAR_DOCKER_HUB_USER: $(DOCKER_HUB_USER)
      VAR_DOCKER_HUB_RO_TOKEN: $(DOCKER_HUB_RO_TOKEN)

  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "$(ROR_TASK) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

steps:
  - bash: |
      sudo rm -rf /usr/share/dotnet
      sudo rm -rf /usr/local/lib/android
      sudo rm -rf /opt/ghc
      sudo rm -rf /usr/local/.ghcup
      sudo rm -rf /usr/share/swift
      sudo rm -rf /usr/local/share/powershell
      sudo rm -rf /opt/hostedtoolcache
      sudo rm -rf /usr/share/rust
      sudo rm -rf /usr/share/miniconda
      sudo rm -rf /usr/local/share/chromium
      sudo rm -rf /usr/local/share/chrome_driver
      sudo rm -rf /opt/pipx
      docker system prune -af
      docker builder prune -af
      df -h /
    displayName: 'Free up disk space and clean Docker'
    target: host
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - script: |
      export ROR_LIBS_STORE_ENDPOINT_URL=$VAR_ROR_LIBS_STORE_ENDPOINT_URL
      export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
      export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET

      # Sourced in-process so DOCKER_AUTH_CONFIG (when set) reaches the testcontainers JVM, and
      # stays UNSET otherwise (a cross-step Azure var can't express "absent", only ""/literal — both
      # of which testcontainers' RegistryAuthLocator would fail to JSON-parse).
      source ci/docker-hub-auth.sh

      echo "[TEST] executing ROR_TASK = $ROR_TASK"
      ci/run-pipeline.sh
    env:
      GRADLE_USER_HOME: $(GRADLE_USER_HOME)
      VAR_ROR_LIBS_STORE_ENDPOINT_URL: $(ROR_LIBS_STORE_ENDPOINT_URL)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
      DOCKER_HUB_USER: $(DOCKER_HUB_USER)
      DOCKER_HUB_RO_TOKEN: $(DOCKER_HUB_RO_TOKEN)

  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "$(ROR_TASK) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

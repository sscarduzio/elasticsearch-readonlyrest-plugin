steps:
  - checkout: self
    fetchDepth: 1
    clean: false
    persistCredentials: true
  - task: JavaToolInstaller@0
    displayName: Switch to Java 21
    inputs:
      versionSpec: '21'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
  - powershell: |
      $env:ROR_LIBS_STORE_URL = $env:VAR_ROR_LIBS_STORE_URL
      $env:ROR_LIBS_STORE_ACCESS_KEY_ID = $env:VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
      $env:ROR_LIBS_STORE_ACCESS_KEY_SECRET = $env:VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET

      Write-Host ">>> $env:ES_MODULE"
      .\gradlew --no-daemon ror-tools:test integration-tests:test "-PesModule=$env:ES_MODULE"
      if ($LASTEXITCODE -ne 0) {
        Get-ChildItem -Recurse -Filter *hs_err* | ForEach-Object {
          Get-Content $_.FullName
        }
        exit 1
      }
    env:
      VAR_ROR_LIBS_STORE_URL: $(ROR_LIBS_STORE_URL)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
      VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
  - task: PublishTestResults@2
    condition: failed()
    inputs:
      testRunTitle: "Windows $(ES_MODULE) results"
      testResultsFiles: "**/TEST*xml"
      mergeTestResults: true

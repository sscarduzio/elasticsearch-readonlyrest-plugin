# Shared step: authenticated Docker Hub pulls for jobs that start testcontainers
# (both the integration tests and the unit tests pull images — osixia/openldap, wiremock,
# toxiproxy, …). Anonymous pulls share one per-IP rate limit across every Azure hosted agent,
# so a busy CI window hits "toomanyrequests". testcontainers/docker-java read DOCKER_AUTH_CONFIG.
#
# Linux/bash only — the Windows IT jobs run ES natively and their Linux-image testcontainers deps
# are IgnoreOnWindows (Windows Docker can't run Linux images), so they never pull and don't need this.
#
# Opt-in: no-op when DOCKER_HUB_USER / DOCKER_HUB_RO_TOKEN aren't both set.
steps:
  - script: |
      if [ -n "$VAR_DOCKER_HUB_RO_TOKEN" ] && [ -n "$VAR_DOCKER_HUB_USER" ]; then
        export DOCKER_AUTH_CONFIG="{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf '%s:%s' "$VAR_DOCKER_HUB_USER" "$VAR_DOCKER_HUB_RO_TOKEN" | base64 -w0)\"}}}"
        # DOCKER_AUTH_CONFIG embeds base64(user:token) and is a plain env var, not a pipeline secret,
        # so with the global system.debug:true the agent could surface it in verbose logs. Register it
        # for redaction in subsequent log output, AND publish it as a job-scoped variable so the later
        # test step (a separate process) inherits it.
        echo "##vso[task.setvariable variable=DOCKER_AUTH_CONFIG;isSecret=true]$DOCKER_AUTH_CONFIG"
        echo "[TEST] Docker Hub authenticated pulls ENABLED (user '$VAR_DOCKER_HUB_USER')"
      else
        echo "[TEST] Docker Hub authenticated pulls DISABLED (anonymous, rate-limited) — DOCKER_HUB_USER/DOCKER_HUB_RO_TOKEN not both set"
      fi
    displayName: 'Configure Docker Hub authenticated pulls'
    env:
      VAR_DOCKER_HUB_USER: $(DOCKER_HUB_USER)
      VAR_DOCKER_HUB_RO_TOKEN: $(DOCKER_HUB_RO_TOKEN)

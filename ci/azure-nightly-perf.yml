# Nightly performance KPI time-series writer (see benchmarks/README.md).
#
# Runs the FULL benchmark suite on ONE pinned self-hosted agent (single hardware fingerprint),
# appends a reduced run record to the `benchmark-history` orphan branch (single writer),
# judges the new record against the rolling median, and re-renders the static dashboard.
#
# Registration is manual: create a new pipeline definition pointing at this file and
# designate the pinned agent below (Agent.Name demand).

schedules:
  - cron: "0 2 * * *"
    displayName: 'Nightly perf KPI run (02:00 UTC)'
    branches:
      include:
        - develop
    always: true

trigger: none
pr: none

variables:
  GRADLE_USER_HOME: '$(Pipeline.Workspace)/.gradle'
  # TODO(manual): replace with the designated pinned agent name before registering the pipeline.
  PERF_AGENT_NAME: 'az-ror-perf-1'

# Pin to ONE agent so the series has a single hardware fingerprint (the whole nightly design).
# Until the agent in PERF_AGENT_NAME is provisioned this demand keeps the pipeline queued rather
# than letting it run on an arbitrary host and silently segment the series by env fingerprint.
pool:
  name: 'Default'
  demands:
    - Agent.Name -equals $(PERF_AGENT_NAME)

jobs:
  - job: NIGHTLY_PERF
    displayName: 'Nightly perf KPIs (pinned agent)'
    timeoutInMinutes: 240
    steps:
      - checkout: self
        fetchDepth: 0
        clean: false
        persistCredentials: true

      - script: |
          set -e
          mkdir -p benchmarks/build/jmh
          ./gradlew --no-daemon --stacktrace :benchmarks:jmh \
            -PjmhArgs="tech.beshu.ror.benchmarks -f 2 -wi 5 -i 5 -prof gc -rf json -rff $(System.DefaultWorkingDirectory)/benchmarks/build/jmh/nightly-raw.json"
        displayName: 'Run full benchmark suite'
        env:
          GRADLE_USER_HOME: $(GRADLE_USER_HOME)

      - script: |
          set -e
          python3 benchmarks/tools/extract.py \
            --input benchmarks/build/jmh/nightly-raw.json \
            --output benchmarks/build/jmh/nightly-record.json \
            --branch develop \
            --jmh-args "-f 2 -wi 5 -i 5 -prof gc"
        displayName: 'Extract reduced run record'

      - script: |
          set -e
          git config user.email "ci@readonlyrest.com"
          git config user.name "ROR perf nightly"
          SRC_SHA=$(git rev-parse --short HEAD)
          DATE_PATH=$(date -u +%Y/%m/%d)
          DATE_TAG=$(date -u +%Y%m%d)
          REC="results/$DATE_PATH/n-$DATE_TAG-$(Build.BuildId)-$SRC_SHA.json"

          # Bootstrap the orphan branch on first run; otherwise track the remote.
          if git fetch origin benchmark-history 2>/dev/null; then
            git worktree add ../bench-history origin/benchmark-history
          else
            git worktree add --detach ../bench-history
            (cd ../bench-history && git checkout --orphan benchmark-history && git rm -rfq . \
             && printf '# benchmark-history\n\nAppend-only ledger of nightly KPI run records.\nSee benchmarks/README.md on develop.\n' > README.md \
             && git add README.md && git commit -m "perf-ci: bootstrap benchmark-history")
          fi

          # Publish HISTORY_DIR as soon as the worktree exists — before the push, which can fail on
          # a network error or rebase conflict. The judge/dashboard steps then still see the local
          # history (incl. this run's freshly-committed record) instead of an empty glob.
          echo "##vso[task.setvariable variable=HISTORY_DIR]$(System.DefaultWorkingDirectory)/../bench-history"

          mkdir -p "../bench-history/$(dirname "$REC")"
          cp benchmarks/build/jmh/nightly-record.json "../bench-history/$REC"
          cd ../bench-history
          git add "$REC"
          git commit -m "perf-ci: nightly record $DATE_TAG ($SRC_SHA)"
          # Single writer; one rebase-retry covers any racing manual run.
          git push origin HEAD:benchmark-history \
            || (git pull --rebase origin benchmark-history && git push origin HEAD:benchmark-history)
        displayName: 'Commit run record to benchmark-history'

      - script: |
          set +e
          python3 benchmarks/tools/nightly_judge.py \
            --record benchmarks/build/jmh/nightly-record.json \
            --history "$HISTORY_DIR/results/**/*.json" \
            --kpis benchmarks/kpis.yml \
            --markdown benchmarks/build/jmh/nightly-judge.md | tee benchmarks/build/jmh/judge-output.txt
          JUDGE_EXIT=${PIPESTATUS[0]}
          if [ "$JUDGE_EXIT" -ne 0 ] && command -v gh >/dev/null; then
            RANGE=$(grep -o 'SUSPECT_RANGE=.*' benchmarks/build/jmh/judge-output.txt | cut -d= -f2)
            {
              echo "Nightly KPI regression detected on the pinned perf agent."
              echo
              [ -n "$RANGE" ] && echo "Suspect commit range: \`$RANGE\`" && echo && git log --oneline "$RANGE" | head -50
              echo
              cat benchmarks/build/jmh/nightly-judge.md
            } > /tmp/perf-issue-body.md
            # --create-label makes the 'performance' label on first use; without it
            # `--label <nonexistent>` aborts the create and `|| true` would silently drop
            # the regression notification. Warn loudly if the create still fails for any reason.
            gh issue create \
              --title "Perf nightly: KPI regression ($(date -u +%Y-%m-%d))" \
              --body-file /tmp/perf-issue-body.md \
              --label performance --create-label \
              || echo "##vso[task.logissue type=warning]gh issue create failed; KPI regression went UNFILED — see judge output above"
          fi
          exit $JUDGE_EXIT
        displayName: 'Judge KPIs vs rolling median'
        continueOnError: true
        env:
          GH_TOKEN: $(GITHUB_TOKEN)

      - script: |
          set -e
          python3 benchmarks/tools/render_dashboard.py \
            --history "$HISTORY_DIR/results/**/*.json" \
            --kpis benchmarks/kpis.yml \
            --output "$HISTORY_DIR/index.html"
          cd "$HISTORY_DIR"
          git add index.html
          git commit -m "perf-ci: refresh dashboard" || echo "dashboard unchanged"
          git push origin HEAD:benchmark-history \
            || (git pull --rebase origin benchmark-history && git push origin HEAD:benchmark-history)
        displayName: 'Render and publish dashboard'

      - task: PublishBuildArtifacts@1
        displayName: 'Publish nightly perf artifacts'
        condition: always()
        continueOnError: true
        inputs:
          pathToPublish: 'benchmarks/build/jmh'
          artifactName: 'perf-nightly'

ALL-UNNAMED:
  - files:
      - relative_path: ../
        relative_to: config
        mode: read
      - path: "/etc/os-release"
        mode: "read"
      - path: "/usr/lib/os-release"
        mode: "read"
      - path: "/proc/sys/net/core/somaxconn"
        mode: read
  - manage_threads
  - inbound_network
  - outbound_network
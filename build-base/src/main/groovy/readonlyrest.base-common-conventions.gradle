plugins {
    id "com.github.hierynomus.license"
    id "com.star-zero.gradle.githook"
    id "org.owasp.dependencycheck"
    id "maven-publish"
    id "scala"
    id "readonlyrest.format-conventions"
}

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    implementation "org.scala-lang:scala3-library_3:3.3.7"
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.forkOptions.with {
        memoryMaximumSize = '1g'
        jvmArgs = ['-XX:MaxMetaspaceSize=512m']
    }
}

test {
    reports {
        junitXml.getRequired().set(true)
        html.getRequired().set(false)
    }
}

dependencyCheck {
    /*
       Severity	Base Score
       None     0
       Low      0.1-3.9
       Medium   4.0-6.9
       High     7.0-8.9
       Critical 9.0-10.0
     */
    failBuildOnCVSS = 3
    scanConfigurations = ['runtimeClasspath'] 
    suppressionFiles = ["${project.rootDir}/suppressions_cve.xml"]
    
    analyzers {
        // We don't need 'exe' or 'dll' files scanning
        assemblyEnabled = false
        // Disable Maven Central checksum lookups (we already have Maven coords from Gradle).
        // Avoids flaky network calls to Central search.
        centralEnabled = false

        ossIndex {
            // Configure the OSS Index analyzer. If no credentials are supplied,
            // dependency-check will skip this analyzer and log a warning.
            if (System.getenv('OSS_INDEX_USERNAME')) {
                username = System.getenv('OSS_INDEX_USERNAME')
            }
            if (System.getenv('OSS_INDEX_PASSWORD')) {
                password = System.getenv('OSS_INDEX_PASSWORD')
            }
        }
    }
    data {
        if (System.getenv('DEPENDENCY_CHECK_DATA_DIR')) {  // We want to fall back to the default path for local builds
            directory = System.getenv('DEPENDENCY_CHECK_DATA_DIR')
        }
    }
    nvd {
        // Not required when using datafeedUrl — API key is only needed for NVD REST API rate limiting.
        // Kept here as fallback in case datafeedUrl is removed.
        apiKey = System.getenv('NVD_API_KEY')
        autoUpdate = true
        // Use bulk NVD data feeds instead of the NVD REST API. Static .gz files are downloaded
        // directly — no rate limits, no API key required, resilient to NVD API instability.
        // {0} is replaced with the year (e.g. 2026).
        // Two supported choices (https://github.com/dependency-check/DependencyCheck/discussions/8633#discussioncomment-17406436):
        //   ODC's own feed built from the API (updated once a day, may be slightly stale but resilient to NVD outages):
        //      https://dependency-check.github.io/DependencyCheck_Builder/nvd_cache/nvdcve-{0}.json.gz
        //   NVD's official 2.0 data feeds (authoritative but prone to instability):
        //      https://nvd.nist.gov/feeds/json/cve/2.0/nvdcve-2.0-{0}.json.gz
        // Using ODC's feed as NVD tends to be unreliable.
        datafeedUrl = 'https://dependency-check.github.io/DependencyCheck_Builder/nvd_cache/nvdcve-{0}.json.gz'
        validForHours = 12
    }
}

// Dev-only: parallel CI shard builds race on .git/hooks/pre-commit writes
// ("No such file or directory" during project evaluation), so skip hooks in CI.
if (!System.getenv('CI')) {
    githook {
        hooks {
            "pre-commit" {
                shell = """
                    ./gradlew license --rerun-tasks || exit 1
                    STAGED=\$(git diff --cached --name-only --diff-filter=ACMR -- '*.scala' '*.java' | tr '\\n' ',' | sed 's/,\$//')
                    if [ -n "\$STAGED" ]; then
                        ./gradlew spotlessApply -PspotlessStagedFiles="\$STAGED" || exit 1
                        echo "\$STAGED" | tr ',' '\\n' | xargs git add --
                    fi
                """
            }
        }
    }
}

license {
    header = rootProject.file('ReadonlyRESTLicenseHeader.txt')
    skipExistingHeaders = true
    useDefaultMappings = false
    includes(['**/*.java', '**/*.scala'])
    mapping {
        java = 'SLASHSTAR_STYLE'
        scala = 'SLASHSTAR_STYLE'
    }
}

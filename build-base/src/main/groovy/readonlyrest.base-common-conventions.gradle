plugins {
    id "com.github.hierynomus.license"
    id "com.star-zero.gradle.githook"
    id "org.owasp.dependencycheck"
    id "maven-publish"
    id "scala"
    id "com.diffplug.spotless"
}

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    implementation "org.scala-lang:scala3-library_3:3.3.7"
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.forkOptions.with {
        memoryMaximumSize = '1g'
        jvmArgs = ['-XX:MaxMetaspaceSize=512m']
    }
}

test {
    reports {
        junitXml.getRequired().set(true)
        html.getRequired().set(false)
    }
}

dependencyCheck {
    /*
       Severity	Base Score
       None     0
       Low      0.1-3.9
       Medium   4.0-6.9
       High     7.0-8.9
       Critical 9.0-10.0
     */
    failBuildOnCVSS = 3
    scanConfigurations = ['runtimeClasspath'] 
    suppressionFiles = ["${project.rootDir}/suppressions_cve.xml"]
    
    analyzers {
        // We don't need 'exe' or 'dll' files scanning
        assemblyEnabled = false
        // Disable Maven Central checksum lookups (we already have Maven coords from Gradle).
        // Avoids flaky network calls to Central search.
        centralEnabled = false

        ossIndex {
            // Configure the OSS Index analyzer. If no credentials are supplied,
            // dependency-check will skip this analyzer and log a warning.
            if (System.getenv('OSS_INDEX_USERNAME')) {
                username = System.getenv('OSS_INDEX_USERNAME')
            }
            if (System.getenv('OSS_INDEX_PASSWORD')) {
                password = System.getenv('OSS_INDEX_PASSWORD')
            }
        }
    }
    data {
        if (System.getenv('DEPENDENCY_CHECK_DATA_DIR')) {  // We want to fall back to the default path for local builds
            directory = System.getenv('DEPENDENCY_CHECK_DATA_DIR')
        }
    }
    nvd {
        apiKey = System.getenv('NVD_API_KEY')
    }
}

githook {
    hooks {
        "pre-commit" {
            shell = """
                ./gradlew license --rerun-tasks || exit 1
                STAGED=\$(git diff --cached --name-only --diff-filter=ACMR -- '*.scala' '*.java' | tr '\\n' ',' | sed 's/,\$//')
                if [ -n "\$STAGED" ]; then
                    ./gradlew spotlessApply -PspotlessStagedFiles="\$STAGED" || exit 1
                    echo "\$STAGED" | tr ',' '\\n' | xargs -d '\\n' git add --
                fi
            """
        }
    }
}

license {
    header = rootProject.file('ReadonlyRESTLicenseHeader.txt')
    skipExistingHeaders = true
    useDefaultMappings = false
    includes(['**/*.java', '**/*.scala'])
    mapping {
        java = 'SLASHSTAR_STYLE'
        scala = 'SLASHSTAR_STYLE'
    }
}

def stagedFilesFor = { String ext ->
    if (!project.hasProperty('spotlessStagedFiles')) return null
    def projectPrefix = rootProject.projectDir.toURI()
        .relativize(project.projectDir.toURI()).toString()
    (project.property('spotlessStagedFiles') as String)
        .split(',')
        .findAll { it.startsWith(projectPrefix) && it.endsWith(ext) }
        .collect { rootProject.file(it) }
        .findAll { it.exists() }
}

spotless {
    def scalafmtVersion = rootProject.file('.scalafmt.conf')
        .readLines()
            .findResult { line ->
                def m = (line =~ /^\s*version\s*=\s*"([^"]+)"/)
                m.matches() ? m[0][1] : null
            }
    if (!scalafmtVersion) {
        throw new GradleException("Could not determine scalafmt version from .scalafmt.conf")
    }
    java {
        googleJavaFormat().reorderImports(false).formatJavadoc(false)
        removeUnusedImports()
        importOrder('', 'java|javax')
        def files = stagedFilesFor('.java')
        // null = property not set, format everything; empty = no staged files in this project,
        // use non-matching glob so Spotless skips this project without falling back to all files
        if (files != null) target(files.isEmpty() ? ['**/__no_staged_files__'] : files)
    }
    scala {
        scalafmt(scalafmtVersion).configFile("${rootProject.projectDir}/.scalafmt.conf")
        def files = stagedFilesFor('.scala')
        // null = property not set, format everything; empty = no staged files in this project,
        // use non-matching glob so Spotless skips this project without falling back to all files
        if (files != null) target(files.isEmpty() ? ['**/__no_staged_files__'] : files)
    }
}

tasks.register("formatCode") {
    group = "verification"
    description = "Format all sources (alias for spotlessApply)"
    dependsOn "spotlessApply"
}

tasks.register("formatCodeCheck") {
    group = "verification"
    description = "Check all sources are formatted (alias for spotlessCheck)"
    dependsOn "spotlessCheck"
}

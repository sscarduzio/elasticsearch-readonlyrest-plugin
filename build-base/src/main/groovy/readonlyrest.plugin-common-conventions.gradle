plugins {
    id "readonlyrest.base-common-conventions"
}

project.ext {
    pluginName = rootProject.properties['pluginName']
    publishedPluginVersion = rootProject.properties['pluginVersion']
    pluginVersion = rootProject.properties['pluginVersion']
    esVersion = project.hasProperty('esVersion') ? project.property('esVersion') : project.property('supportedEsVersions').split(',')*.trim().findAll { it }.last()
    s3BucketName = System.getenv('ROR_LIBS_STORE_BUCKET') ?: 'beshu'
    s3StoreAddress = System.getenv('ROR_LIBS_STORE_ENDPOINT_URL') ?: 'https://dgp.serve.beshu.tech'
    s3LibsPathPrefix = (System.getenv('ROR_LIBS_STORE_PATH_PREFIX') ?: 'ror/libs').replaceAll('^/+', '').replaceAll('/+$', '')
}

group = 'org.elasticsearch.plugin'
version = "${pluginVersion}_es${project.ext.esVersion}"

repositories {
    maven {
        url = uri("${project.ext.s3StoreAddress.replaceAll('/+$', '')}/${project.ext.s3BucketName}/${project.ext.s3LibsPathPrefix}")
        metadataSources {
            artifact()
        }
    }
}

configurations {
    distJars {
        extendsFrom runtimeClasspath
    }
}

dependencyCheck {
    // Override base convention: ES plugin modules should scan distJars configuration
    // which contains the actual dependencies that get packaged with the plugin
    scanConfigurations = ['distJars']
}

docker {
    registryCredentials {
        username = System.getenv('DOCKER_REGISTRY_USER')
        password = System.getenv('DOCKER_REGISTRY_PASSWORD')
    }
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.additionalParameters = [
            "-feature",
            "-Xfatal-warnings",
            "-Wunused:implicits",
            "-Wunused:imports",
            "-Wunused:explicits",
            "-Wunused:strict-no-implicit-warn",
            "-Wunused:locals",
            "-Wunused:params",
            "-Wunused:privates",
            "-Wconf:cat=deprecation&msg=\\[ROR\\].*:i"
            // There are multiple reports of issues with `-Wunused:nowarn` flag when using Scala 3.3.X
            // It seems that this problem occurs in es{version}x modules when using deprecated `org.elasticsearch.index.query.CommonTermsQueryBuilder`
            // - https://github.com/scala/scala3/issues/19992
            // - https://github.com/scala/scala3/issues/18341
            // - https://users.scala-lang.org/t/wunused-on-scala-3-3-0/9401
            // "-Wunused:nowarn",
    ]
}

tasks.withType(Zip).configureEach { task ->
    task.doLast {
        ant.checksum file: task.archiveFile.get().asFile, algorithm: 'sha1'
    }
}

tasks.register('generateVersionsFile') {
    outputs.upToDateWhen { false }
    doFirst {
        def resourcesDir = sourceSets.main.output.resourcesDir

        resourcesDir.mkdirs()
        def contents = "es_version=$project.ext.esVersion\nplugin_version=$pluginVersion"
        new File(resourcesDir, "ror-build-info.properties").text = contents
    }
}

tasks.register('toJar', Jar) {
    dependsOn generateVersionsFile
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveBaseName = pluginName
    from sourceSets.main.getOutput()
}

tasks.register('prepareMultiplatformBuilder') {
    group = 'docker'
    doLast {
        def execOps = project.services.get(ExecOperations)
        def output = new ByteArrayOutputStream()
        execOps.exec {
            executable = 'docker'
            args = ['buildx', 'inspect']
            standardOutput = output
            errorOutput = System.err
        }
        def supportedPlatforms = output.toString().find(/Platforms: ([^\n]+)/)?.replace("Platforms: ", "")?.split(',')

        if (supportedPlatforms == null || !(supportedPlatforms.contains('linux/amd64') && supportedPlatforms.contains('linux/arm64'))) {
            try {
                execOps.exec {
                    executable = 'docker'
                    args = ['buildx', 'inspect', 'ror_kbn_builder']
                    errorOutput = new ByteArrayOutputStream()
                }
            } catch (Exception e) {
                if (e.getMessage().contains("non-zero exit")) {
                    execOps.exec {
                        executable = 'docker'
                        args = ['buildx', 'create', '--platform=linux/amd64,linux/arm64', '--name=ror_kbn_builder']
                    }
                }
            }

            execOps.exec {
                executable = 'docker'
                args = ['buildx', 'use', 'ror_kbn_builder']
            }
        }
    }
}

// Downloads, for one target ES version, the dependency jars whose content depends on the ES version.
// These are the `org.elasticsearch.*` artifacts that distJars keeps (elasticsearch-rest-client, plus
// transport-netty4-client on es6x/es7x). We don't hardcode them: we discover them from the resolved
// distJars, so a module bundling a different ES-versioned jar just works. Everything else in the zip is the
// same across patch versions and gets reused by repackageRorPluginForVersion.
//
// Usage: -PtargetVersion=9.2.1  -PesJarsDir=<dir>   ->   <dir>/9.2.1/<artifact>-9.2.1.jar
tasks.register('downloadEsVersionedDependencyJars') {
    outputs.upToDateWhen { false }
    doLast {
        def target = project.findProperty('targetVersion')
        def esJarsDirProp = project.findProperty('esJarsDir')
        if (target == null || esJarsDirProp == null) {
            throw new GradleException("downloadEsVersionedDependencyJars requires -PtargetVersion=<version> and -PesJarsDir=<path>")
        }

        // These jars carry the ES version (e.g. elasticsearch-rest-client-9.3.5). ROR's own modules also
        // sit under `org.elasticsearch.plugin` but carry pluginVersion, so matching on esVersion skips them.
        def esVersionedArtifacts = configurations.distJars.resolvedConfiguration.resolvedArtifacts
                .findAll {
                    it.moduleVersion.id.group.startsWith('org.elasticsearch') &&
                            it.moduleVersion.id.version == project.ext.esVersion
                }
                .collect { [group: it.moduleVersion.id.group, name: it.moduleVersion.id.name] }
                .unique()

        logger.lifecycle("Downloading ES-versioned dependency jars {} for ES {} into {}",
                esVersionedArtifacts.collect { it.name }, target, esJarsDirProp)

        def destDir = file("${esJarsDirProp}/${target}")
        destDir.mkdirs()
        esVersionedArtifacts.each { art ->
            def detached = configurations.detachedConfiguration(dependencies.create("${art.group}:${art.name}:${target}"))
            detached.transitive = false
            detached.resolve().each { jarFile ->
                copy {
                    from jarFile
                    into destDir
                }
            }
        }
    }
}

// Builds the plugin zip for one target ES patch version from the module's already-built BASE zip, WITHOUT
// recompiling. The bytecode is the same across a module's patch range; only three things differ per version:
//   * plugin-descriptor.properties -> elasticsearch.version (ES requires it to match the node version)
//   * ror-build-info.properties    -> es_version (inside the fat ROR jar; only shows up in the boot log)
//   * the ES-versioned dependency jars from downloadEsVersionedDependencyJars (<esJarsDir>/<target>/)
// We copy the base zip, patch those three, and re-zip. Depends on downloadEsVersionedDependencyJars (same
// -PtargetVersion), so a single invocation fetches the target's jars and then repackages with them.
//
// Usage: -PesVersion=<base> -PtargetVersion=9.2.1  -PesJarsDir=<dir>  [-PoutputDir=<dir>]
//   -> <outputDir>/<pluginName>-<pluginVersion>_es<target>.zip (+ .sha1 / .sha512)
// outputDir defaults to build/distributions, so derived zips land next to the full-build zip and `clean`
// removes them -- a deliverable is a deliverable regardless of whether it was compiled or repackaged.
tasks.register('repackageRorPluginForVersion') {
    dependsOn 'downloadEsVersionedDependencyJars'
    outputs.upToDateWhen { false }
    doLast {
        def target = project.findProperty('targetVersion')
        def esJarsDirProp = project.findProperty('esJarsDir')
        def outputDirProp = project.findProperty('outputDir')
        if (target == null || esJarsDirProp == null) {
            throw new GradleException("repackageRorPluginForVersion requires -PtargetVersion=<version> and -PesJarsDir=<path>")
        }

        def baseEs = project.ext.esVersion
        def baseZip = layout.buildDirectory.file("distributions/${pluginName}-${pluginVersion}_es${baseEs}.zip").get().asFile
        if (!baseZip.exists()) {
            throw new GradleException("base zip not found (build the module first): ${baseZip}")
        }
        def fatJarBaseName = "${pluginName}-${pluginVersion}_es${baseEs}.jar"

        def outputDir = outputDirProp != null ? file(outputDirProp) : layout.buildDirectory.dir("distributions").get().asFile
        outputDir.mkdirs()

        // Writes a bare lowercase hex digest to <zip><ext>, same format the normal build emits
        // (.sha512 from createRorPluginChecksums, .sha1 from the Zip doLast above).
        def writeChecksum = { File f, String alg, String ext ->
            def md = java.security.MessageDigest.getInstance(alg)
            f.eachByte(64 * 1024) { byte[] buf, int n -> md.update(buf, 0, n) }
            def hex = md.digest().collect { String.format('%02x', it) }.join('')
            new File(f.parentFile, f.name + ext).text = hex + '\n'
        }

        logger.lifecycle("Repackaging {} base ES {} -> ES {} (ROR {})", project.name, baseEs, target, pluginVersion)

        def work = java.nio.file.Files.createTempDirectory("ror-repkg").toFile()
        try {
            // 1) Extract the base zip (entries at the archive root).
            copy { from zipTree(baseZip); into work }

            // 2) plugin-descriptor.properties: only elasticsearch.version changes per version (the
            //    `version` field is the plugin version, same across patch versions).
            def descriptor = new File(work, 'plugin-descriptor.properties')
            descriptor.text = descriptor.readLines().collect {
                it.startsWith('elasticsearch.version=') ? "elasticsearch.version=${target}" : it
            }.join('\n') + '\n'

            // 3) ror-build-info.properties inside the fat ROR jar (boot-log only). Also rename the jar
            //    to the target version -- cosmetic only, ES scans the dir and ignores the jar name.
            def fatJarBase = new File(work, fatJarBaseName)
            if (!fatJarBase.exists()) {
                throw new GradleException("fat ROR jar not found in base zip: ${fatJarBaseName}")
            }
            def buildInfo = new File(work, 'ror-build-info.properties')
            buildInfo.text = "es_version=${target}\nplugin_version=${pluginVersion}"
            ant.zip(destfile: fatJarBase, update: true) {
                fileset(dir: work, includes: 'ror-build-info.properties')
            }
            buildInfo.delete()
            def fatJarTargetName = "${pluginName}-${pluginVersion}_es${target}.jar"
            if (fatJarBaseName != fatJarTargetName) {
                fatJarBase.renameTo(new File(work, fatJarTargetName))
            }

            // 4) Swap the ES-versioned dependency jars: downloaded <target> in, <base> out. Downloaded
            //    jars are named "<artifact>-<target>.jar"; the base zip has "<artifact>-<base>.jar".
            def targetJarsDir = new File("${esJarsDirProp}/${target}")
            def downloadedJars = (targetJarsDir.listFiles() ?: []).findAll { it.name.endsWith('.jar') }
            if (downloadedJars.isEmpty()) {
                throw new GradleException("no ES jars for ES ${target} in ${targetJarsDir} (run downloadEsVersionedDependencyJars first)")
            }
            downloadedJars.each { jar ->
                def jarName = jar.name
                if (!jarName.endsWith("-${target}.jar")) {
                    throw new GradleException("jar '${jarName}' does not match '<artifact>-${target}.jar'")
                }
                def artifact = jarName.substring(0, jarName.length() - "-${target}.jar".length())
                new File(work, "${artifact}-${baseEs}.jar").delete()
                copy { from jar; into work }
            }

            // 5) Re-zip flat (entries at the archive root, like packageRorPlugin) + checksums.
            def outputZip = new File(outputDir, "${pluginName}-${pluginVersion}_es${target}.zip")
            outputZip.delete()
            ant.zip(destfile: outputZip, basedir: work)
            writeChecksum(outputZip, 'SHA-1', '.sha1')
            writeChecksum(outputZip, 'SHA-512', '.sha512')

            logger.lifecycle("Wrote {} (+ .sha1 / .sha512)", outputZip)
        } finally {
            work.deleteDir()
        }
    }
}

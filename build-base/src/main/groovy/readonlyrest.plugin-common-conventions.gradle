plugins {
    id "readonlyrest.base-common-conventions"
}

project.ext {
    pluginName = rootProject.properties['pluginName']
    publishedPluginVersion = rootProject.properties['pluginVersion']
    pluginVersion = rootProject.properties['pluginVersion']
    esVersion = project.hasProperty('esVersion') ? project.property('esVersion') : project.property('latestSupportedEsVersion')
    s3BucketName = System.getenv('BUCKET') ?: 'beshu'
    s3StoreAddress = System.getenv('ROR_LIBS_STORE_URL') ?: 'https://dgp.serve.beshu.tech'
}

group = 'org.elasticsearch.plugin'
version = "${pluginVersion}_es${project.ext.esVersion}"

repositories {
    maven {
        url = uri("${project.ext.s3StoreAddress.replaceAll('/+$', '')}/${project.ext.s3BucketName}/ror/libs")
        metadataSources {
            artifact()
        }
    }
}

configurations {
    distJars {
        extendsFrom runtimeClasspath
    }
}

dependencyCheck {
    // Override base convention: ES plugin modules should scan distJars configuration
    // which contains the actual dependencies that get packaged with the plugin
    scanConfigurations = ['distJars']
}

docker {
    registryCredentials {
        username = System.getenv('DOCKER_REGISTRY_USER')
        password = System.getenv('DOCKER_REGISTRY_PASSWORD')
    }
}

tasks.withType(ScalaCompile).configureEach {
    scalaCompileOptions.additionalParameters = [
            "-feature",
            "-Xfatal-warnings",
            "-Wunused:implicits",
            "-Wunused:imports",
            "-Wunused:explicits",
            "-Wunused:strict-no-implicit-warn",
            "-Wunused:locals",
            "-Wunused:params",
            "-Wunused:privates",
            "-Wconf:cat=deprecation&msg=\\[ROR\\].*:i"
            // There are multiple reports of issues with `-Wunused:nowarn` flag when using Scala 3.3.X
            // It seems that this problem occurs in es{version}x modules when using deprecated `org.elasticsearch.index.query.CommonTermsQueryBuilder`
            // - https://github.com/scala/scala3/issues/19992
            // - https://github.com/scala/scala3/issues/18341
            // - https://users.scala-lang.org/t/wunused-on-scala-3-3-0/9401
            // "-Wunused:nowarn",
    ]
}

tasks.withType(Zip).configureEach { task ->
    task.doLast {
        ant.checksum file: task.archiveFile.get().asFile, algorithm: 'sha1'
    }
}

tasks.register('generateVersionsFile') {
    outputs.upToDateWhen { false }
    doFirst {
        def resourcesDir = sourceSets.main.output.resourcesDir

        resourcesDir.mkdirs()
        def contents = "es_version=$project.ext.esVersion\nplugin_version=$pluginVersion"
        new File(resourcesDir, "ror-build-info.properties").text = contents
    }
}

tasks.register('toJar', Jar) {
    dependsOn generateVersionsFile
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveBaseName = pluginName
    from sourceSets.main.getOutput()
}

tasks.register('prepareMultiplatformBuilder') {
    group = 'docker'
    doLast {
        def execOps = project.services.get(ExecOperations)
        def output = new ByteArrayOutputStream()
        execOps.exec {
            executable = 'docker'
            args = ['buildx', 'inspect']
            standardOutput = output
            errorOutput = System.err
        }
        def supportedPlatforms = output.toString().find(/Platforms: ([^\n]+)/)?.replace("Platforms: ", "")?.split(',')

        if (supportedPlatforms == null || !(supportedPlatforms.contains('linux/amd64') && supportedPlatforms.contains('linux/arm64'))) {
            try {
                execOps.exec {
                    executable = 'docker'
                    args = ['buildx', 'inspect', 'ror_kbn_builder']
                    errorOutput = new ByteArrayOutputStream()
                }
            } catch (Exception e) {
                if (e.getMessage().contains("non-zero exit")) {
                    execOps.exec {
                        executable = 'docker'
                        args = ['buildx', 'create', '--platform=linux/amd64,linux/arm64', '--name=ror_kbn_builder']
                    }
                }
            }

            execOps.exec {
                executable = 'docker'
                args = ['buildx', 'use', 'ror_kbn_builder']
            }
        }
    }
}

// Stages, for a set of target ES versions, the only dependency jars in the plugin zip whose content is
// ES-version-specific: the artifacts under the `org.elasticsearch.*` groups that survive the
// `distJars` `exclude group: 'org.elasticsearch'` (i.e. `elasticsearch-rest-client`, and for es6x/es7x
// also `transport-netty4-client`). The set is DISCOVERED from the resolved `distJars` rather than
// hardcoded, so any module bundling a different ES-stamped artifact is handled automatically. Everything
// else in the zip is fixed-version and reused as-is when repackaging a module's base build for its other
// patch versions (see ci/repackage-plugin-for-version.sh).
//
// Usage: -PstageVersions=9.2.0,9.2.1,…  -PstageDir=<dir>   ->   <dir>/<version>/<artifact>-<version>.jar
tasks.register('stageEsStampedJars') {
    outputs.upToDateWhen { false }
    doLast {
        def stageVersionsProp = project.findProperty('stageVersions')
        def stageDirProp = project.findProperty('stageDir')
        if (stageVersionsProp == null || stageDirProp == null) {
            throw new GradleException("stageEsStampedJars requires -PstageVersions=<csv> and -PstageDir=<path>")
        }
        def versions = stageVersionsProp.toString().split(',').collect { it.trim() }.findAll { !it.isEmpty() }

        // The ES-stamped artifacts are versioned at the ES version itself (e.g. elasticsearch-rest-client
        // -9.3.5). ROR's own modules also live under group `org.elasticsearch.plugin` (see `group =` in
        // this convention) but are versioned at pluginVersion, so the version check excludes them.
        def esStampedArtifacts = configurations.distJars.resolvedConfiguration.resolvedArtifacts
                .findAll {
                    it.moduleVersion.id.group.startsWith('org.elasticsearch') &&
                            it.moduleVersion.id.version == project.ext.esVersion
                }
                .collect { [group: it.moduleVersion.id.group, name: it.moduleVersion.id.name] }
                .unique()

        logger.lifecycle("Staging ES-version-stamped artifacts {} for {} version(s) into {}",
                esStampedArtifacts.collect { it.name }, versions.size(), stageDirProp)

        versions.each { v ->
            def destDir = file("${stageDirProp}/${v}")
            destDir.mkdirs()
            esStampedArtifacts.each { art ->
                def detached = configurations.detachedConfiguration(
                        dependencies.create("${art.group}:${art.name}:${v}"))
                detached.transitive = false
                detached.resolve().each { jarFile ->
                    copy {
                        from jarFile
                        into destDir
                    }
                }
            }
        }
    }
}
####################################
##### Unit tests on Windows
####################################
      - job:
        displayName: 'Unit tests on Windows'
        condition:
          and(
            succeeded(),
            and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'run_all_tests_on_windows'))
          )
        timeoutInMinutes: 150
        # Windows: clear the Linux toolchains-image GRADLE_USER_HOME/GRADLE_OPTS at JOB scope.
        # Step-level env: does not reliably override a pipeline variable for child processes on
        # Windows (gradlew/nested builds inherit /opt/gradle-home -> 'relative path' abort).
        variables:
          GRADLE_USER_HOME: ''
          GRADLE_OPTS: ''
        pool:
          vmImage: 'windows-2025'
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
            persistCredentials: true
          - task: JavaToolInstaller@0
            displayName: Switch to Java 21
            inputs:
              versionSpec: '21'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'
          - powershell: |
                    Write-Host ">>> $env:ES_MODULE"
                    # Override the Linux toolchains-image settings that are invalid on Windows
                    # (installations.paths=/opt/java/... and GRADLE_USER_HOME=/opt/gradle-home).
                    .\gradlew --no-daemon core:test `
                      "-Dorg.gradle.java.installations.paths=" `
                      "-Dorg.gradle.java.installations.auto-download=true"
                    if ($LASTEXITCODE -ne 0) {
                      Get-ChildItem -Recurse -Filter *hs_err* | ForEach-Object {
                        Get-Content $_.FullName
                      }
                      exit 1
                    }
          - task: PublishTestResults@2
            condition: failed()
            inputs:
              testRunTitle: "$(Windows core) results"
              testResultsFiles: "**/TEST*xml"
              mergeTestResults: true

  - stage: BUILD_ROR
    displayName: 'Build ROR plugins'
    dependsOn:
      - REQUIRED_CHECKS
      - TEST
    condition: |
      and(
        succeeded('REQUIRED_CHECKS'),
        succeeded('TEST'),
        eq(variables.isPullRequest, true),
        notIn(variables['Build.Reason'], 'Manual', 'Schedule')
      )
    jobs:
      - job:
        container: ror-toolchains
        timeoutInMinutes: 180
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
          - script: |
              set -e

              echo "[BUILD_ROR] executing ROR_TASK = $ROR_TASK"
              echo ">>> ($ROR_TASK) Building ROR plugins" && ci/run-pipeline.sh
            env:
              GRADLE_USER_HOME: $(GRADLE_USER_HOME)

        strategy:
          maxParallel: 99
          matrix:
            BUILD_9xx:
              ROR_TASK: build_es9xx
            BUILD_8xx:
              ROR_TASK: build_es8xx
            BUILD_7xx:
              ROR_TASK: build_es7xx
            BUILD_6xx:
              ROR_TASK: build_es6xx

  - stage: DETERMINE_CI_TYPE
    displayName: 'Determine if this is release run'
    dependsOn:
      - REQUIRED_CHECKS
      - TEST
    # Runs in two cases:
    #  - auto release: a develop/master push where REQUIRED_CHECKS + TEST passed (the original gate);
    #  - manual release-without-testing: REQUIRED_CHECKS/TEST are intentionally skipped, so we do NOT
    #    require them — just the manual action on develop/master.
    # In both cases EXTRACT_IS_RELEASE computes IsRelease, which the RELEASE_*/PUBLISH_MVN_* stages read.
    condition: |
      and(
        not(canceled()),
        or(eq(variables.isDevelop, true), eq(variables.isMaster, true)),
        or(
          and(
            notIn(variables['Build.Reason'], 'Manual', 'Schedule'),
            succeeded('REQUIRED_CHECKS'),
            succeeded('TEST')
          ),
          and(
            eq(variables['Build.Reason'], 'Manual'),
            eq('${{ parameters.actionToPerform }}', 'release_without_testing')
          )
        )
      )
    jobs:
      - job: EXTRACT_IS_RELEASE
        steps:
          - bash: |
              IS_RELEASE=true
              if grep '^pluginVersion=' gradle.properties | awk -F= '{print $2}' | grep "\-pre"; then
                IS_RELEASE=false
              fi
              echo "##vso[task.setvariable variable=value;isOutput=true]$IS_RELEASE"
            name: IsRelease

  - stage: UPLOAD_PRE_ROR
    displayName: 'Upload to S3 ROR plugin pre-builds'
    dependsOn:
      - DETERMINE_CI_TYPE
      - REQUIRED_CHECKS
      - TEST
    condition: |
      and(
        succeeded('DETERMINE_CI_TYPE'),
        succeeded('REQUIRED_CHECKS'),
        succeeded('TEST'),
        or(eq(variables.isDevelop, true), eq(variables.isMaster, true)),
        eq(dependencies.DETERMINE_CI_TYPE.outputs['EXTRACT_IS_RELEASE.IsRelease.value'], false),
        notIn(variables['Build.Reason'], 'Manual', 'Schedule')
      )
    jobs:
      - job:
        container: ror-toolchains
        timeoutInMinutes: 600
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
            persistCredentials: true
          - script: |
              set -e

              export ROR_ARTIFACTS_STORE_ENDPOINT_URL=$VAR_ROR_ARTIFACTS_STORE_ENDPOINT_URL
              export ROR_ARTIFACTS_STORE_REGION=$VAR_ROR_ARTIFACTS_STORE_REGION
              export ROR_ARTIFACTS_STORE_ACCESS_KEY_ID=$VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_ID
              export ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET
              export ROR_ARTIFACTS_STORE_BUCKET=$VAR_ROR_ARTIFACTS_STORE_BUCKET
              export ROR_ARTIFACTS_STORE_PATH_PREFIX=$VAR_ROR_ARTIFACTS_STORE_PATH_PREFIX
              export ROR_LIBS_STORE_ENDPOINT_URL=$VAR_ROR_LIBS_STORE_ENDPOINT_URL
              export ROR_LIBS_STORE_REGION=$VAR_ROR_LIBS_STORE_REGION
              export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
              export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET
              export ROR_LIBS_STORE_BUCKET=$VAR_ROR_LIBS_STORE_BUCKET
              export ROR_LIBS_STORE_PATH_PREFIX=$VAR_ROR_LIBS_STORE_PATH_PREFIX

              if ! docker login -u $var_docker_registry_user -p $var_docker_registry_password; then
                echo "Error: Failed to login to Docker registry"
                exit 1
              fi

              echo "[UPLOAD_PRE_ROR] executing ROR_TASK = $ROR_TASK"
              echo ">>> ($ROR_TASK) Uploading pre-ROR" && ci/run-pipeline.sh
            timeoutInMinutes: 600
            env:
              VAR_ROR_ARTIFACTS_STORE_ENDPOINT_URL: $(ROR_ARTIFACTS_STORE_ENDPOINT_URL)
              VAR_ROR_ARTIFACTS_STORE_REGION: $(ROR_ARTIFACTS_STORE_REGION)
              VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_ID: $(ROR_ARTIFACTS_STORE_ACCESS_KEY_ID)
              VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET: $(ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET)
              VAR_ROR_ARTIFACTS_STORE_BUCKET: $(ROR_ARTIFACTS_STORE_BUCKET)
              VAR_ROR_ARTIFACTS_STORE_PATH_PREFIX: $(ROR_ARTIFACTS_STORE_PATH_PREFIX)
              VAR_ROR_LIBS_STORE_ENDPOINT_URL: $(ROR_LIBS_STORE_ENDPOINT_URL)
              VAR_ROR_LIBS_STORE_REGION: $(ROR_LIBS_STORE_REGION)
              VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
              VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
              VAR_ROR_LIBS_STORE_BUCKET: $(ROR_LIBS_STORE_BUCKET)
              VAR_ROR_LIBS_STORE_PATH_PREFIX: $(ROR_LIBS_STORE_PATH_PREFIX)
              var_docker_registry_user: $(DOCKER_REGISTRY_USER)
              var_docker_registry_password: $(DOCKER_REGISTRY_PASSWORD)
              GRADLE_USER_HOME: $(GRADLE_USER_HOME)

        strategy:
          maxParallel: 99
          matrix:
            UPLOAD_PRE_9xx:
              ROR_TASK: upload_pre_es9xx
            UPLOAD_PRE_8xx:
              ROR_TASK: upload_pre_es8xx
            UPLOAD_PRE_7xx:
              ROR_TASK: upload_pre_es7xx
            UPLOAD_PRE_6xx:
              ROR_TASK: upload_pre_es6xx

  - stage: RELEASE_ROR
    displayName: 'Release ROR plugins'
    dependsOn:
      - DETERMINE_CI_TYPE
      - REQUIRED_CHECKS
      - TEST
    condition: |
      and(
        succeeded('DETERMINE_CI_TYPE'),
        succeeded('REQUIRED_CHECKS'),
        succeeded('TEST'),
        or(eq(variables.isDevelop, true), eq(variables.isMaster, true)),
        eq(dependencies.DETERMINE_CI_TYPE.outputs['EXTRACT_IS_RELEASE.IsRelease.value'], true),
        notIn(variables['Build.Reason'], 'Manual', 'Schedule')
      )
    jobs:
      - job:
        container: ror-toolchains
        timeoutInMinutes: 180
        steps:
          - template: ci/azure-templates/release-ror-steps.yml

        strategy:
          maxParallel: 99
          matrix:
            RELEASE_ES_9xx:
              ROR_TASK: release_es9xx
            RELEASE_ES_8xx:
              ROR_TASK: release_es8xx
            RELEASE_ES_7xx:
              ROR_TASK: release_es7xx
            RELEASE_ES_6xx:
              ROR_TASK: release_es6xx

  # Runs the full release flow (build + S3 upload + Docker publish + git tag) identical to
  # RELEASE_ROR but skips the test suite. Use when the code is already validated and you
  # need to ship immediately (e.g. after a failed release that only needs a re-run, or when
  # tests have already passed on a prior run). Triggered manually only.
  - stage: RELEASE_ROR_WITHOUT_TESTING
    displayName: 'Release ROR plugins (without testing)'
    dependsOn:
      - DETERMINE_CI_TYPE
      - TOOLCHAINS_VERIFY
    condition: |
      and(
        succeeded('DETERMINE_CI_TYPE'),
        in(dependencies.TOOLCHAINS_VERIFY.result, 'Succeeded', 'SucceededWithIssues'),
        eq(variables['Build.Reason'], 'Manual'),
        eq('${{ parameters.actionToPerform }}', 'release_without_testing'),
        or(eq(variables.isDevelop, true), eq(variables.isMaster, true)),
        eq(dependencies.DETERMINE_CI_TYPE.outputs['EXTRACT_IS_RELEASE.IsRelease.value'], true)
      )
    jobs:
      - job:
        container: ror-toolchains
        timeoutInMinutes: 180
        steps:
          - template: ci/azure-templates/release-ror-steps.yml
            parameters:
              phase: RELEASE_ROR_WITHOUT_TESTING

        strategy:
          maxParallel: 99
          matrix:
            RELEASE_ES_9xx:
              ROR_TASK: release_es9xx
            RELEASE_ES_8xx:
              ROR_TASK: release_es8xx
            RELEASE_ES_7xx:
              ROR_TASK: release_es7xx
            RELEASE_ES_6xx:
              ROR_TASK: release_es6xx

  - stage: PUBLISH_MVN_ARTIFACTS
    displayName: 'Publish Maven artifacts'
    dependsOn:
      - DETERMINE_CI_TYPE
      - REQUIRED_CHECKS
      - TEST
    condition: |
      and(
        succeeded('DETERMINE_CI_TYPE'),
        succeeded('REQUIRED_CHECKS'),
        succeeded('TEST'),
        eq(variables.isMaster, true),
        eq(dependencies.DETERMINE_CI_TYPE.outputs['EXTRACT_IS_RELEASE.IsRelease.value'], true),
        notIn(variables['Build.Reason'], 'Manual', 'Schedule')
      )

    jobs:
      - job:
        container: ror-toolchains
        steps:
          - template: ci/azure-templates/publish-mvn-steps.yml

  - stage: PUBLISH_MVN_ARTIFACTS_WITHOUT_TESTING
    displayName: 'Publish Maven artifacts (without testing)'
    dependsOn:
      - DETERMINE_CI_TYPE
      - TOOLCHAINS_VERIFY
    condition: |
      and(
        succeeded('DETERMINE_CI_TYPE'),
        in(dependencies.TOOLCHAINS_VERIFY.result, 'Succeeded', 'SucceededWithIssues'),
        eq(variables['Build.Reason'], 'Manual'),
        eq('${{ parameters.actionToPerform }}', 'release_without_testing'),
        eq(variables.isMaster, true),
        eq(dependencies.DETERMINE_CI_TYPE.outputs['EXTRACT_IS_RELEASE.IsRelease.value'], true)
      )
    jobs:
      - job:
        container: ror-toolchains
        steps:
          - template: ci/azure-templates/publish-mvn-steps.yml
            parameters:
              phase: MVN_PUBLISH_WITHOUT_TESTING

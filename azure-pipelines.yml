# Single source of truth for the CI toolchains image (bump the tag here on a JDK/Gradle change).
# Declared as a container resource (NOT a variable) because the job-level `container:` property is
# resolved at compile time and does not expand $(variables).
resources:
  containers:
    - container: ror-toolchains
      image: beshultd/ror-ci-toolchains:jdk-8-11-17-21-gradle-9.2.1

variables:
  system.debug: 'true'
  ssh_file: '~/.ssh/gh_deploy_key.priv'
  isMaster: $[eq(variables['Build.SourceBranch'], 'refs/heads/master')]
  isDevelop: $[eq(variables['Build.SourceBranch'], 'refs/heads/develop')]
  isPullRequest: $[eq(variables['Build.Reason'], 'PullRequest')]
  isEpicBranchOrPr: $[or(contains(variables['Build.SourceBranch'], 'epic/'), contains(variables['System.PullRequest.SourceBranch'], 'epic/'))]
  isNewEsBranchOrPr: $[or(contains(variables['Build.SourceBranch'], 'newes/'), contains(variables['System.PullRequest.SourceBranch'], 'newes/'))]
  dependencyCheckCacheKey: $[format('dependency-check-v1-{0:yyyyMM}', pipeline.startTime)]
  dependencyCheckDataDir: '$(Pipeline.Workspace)/dependency-check-data/v1'
  # Integration-test shards per agent (separate JVM + ES container each, disjoint suite subsets).
  # 1 = no sharding (default). Raise (e.g. 2) ONLY for agents with RAM for K concurrent ES instances.
  IT_SHARD_COUNT: 1
  # Use the Gradle home baked into the CI image (ci/toolchains/JdkToolchains.Dockerfile): it already contains the
  # Gradle distribution + resolved plugins/dependencies, so in the common (warm-cache) case builds make
  # no network calls to flaky external CDNs. Cache misses (e.g. a dep bumped since the last image
  # rebuild) fall back to the network naturally; the scheduled BUILD_TOOLCHAINS_IMAGE run keeps that
  # stale window short.
  GRADLE_USER_HOME: '/opt/gradle-home'
  # Disable toolchain auto-download (fail fast instead of hitting the adoptium CDN). The CI-image
  # JDK locations are NOT set here — they live in the image's baked GRADLE_USER_HOME/gradle.properties
  # (reliably honoured, unlike installations.paths via GRADLE_OPTS), so they apply only to the Linux
  # container jobs and never leak to the bare Windows jobs (which use a workspace-local GRADLE_USER_HOME).
  GRADLE_OPTS: '-Dorg.gradle.java.installations.auto-download=false'

trigger:
  # Coalesce rapid pushes into one run (Azure has no auto-cancel for branch runs).
  batch: true
  branches:
    include:
      - master
      - develop
      - 'epic/*'
      - '*/epic/*'
  tags:
    exclude:
      - '*'
  paths:
    include:
      - '*'
    exclude:
      - 'docs/*'
      - '*.md'
      - '*/*/*.md'

pr:
  # A new commit cancels the prior in-progress PR run instead of stacking another
  # full run on the queue (GitHub default; set explicitly so it is version-controlled).
  autoCancel: true
  branches:
    include:
      - master
      - develop
      - 'epic/*'
      - '*/epic/*'
  paths:
    include:
      - '*'
    exclude:
      - 'docs/*'
      - '*.md'
      - '*/*/*.md'

# Scheduled rebuild of the CI toolchains image (BUILD_TOOLCHAINS_IMAGE only; every other stage is
# gated on Build.Reason != 'Schedule'). Keeps the baked Gradle cache fresh without manual action:
# a dep bumped during the week falls back to the network until the next rebuild closes the gap.
schedules:
  - cron: '0 3 * * 1'
    displayName: 'Weekly CI toolchains image rebuild'
    branches:
      include:
        - develop
    always: true

parameters:
  - name: actionToPerform
    type: string
    displayName: '(Manual) action to perform'
    default: 'run_all_tests_on_linux'
    values:
      - 'run_all_tests_on_linux'
      - 'run_all_tests_on_windows'
      - 'build_toolchains_image'
      - 'release_without_testing'
  - name: runDiskProbe
    type: boolean
    displayName: '(Manual) run host-disk probe only, then kill build'
    default: false

pool:
  vmImage: 'ubuntu-24.04'

stages:

  # Cancels stale Azure Pipelines runs for the same PR: closes Azure's at-queue-time autoCancel race
  # by cancelling older in-progress runs of the same PR (and self-cancelling if a newer run already
  # exists). Runs FIRST so no agent time / container pull is wasted on a stale run. Only affects
  # PullRequest runs; branch runs rely on `trigger.batch` and are skipped by the script.
  - stage: SUPERSEDE_GUARD
    displayName: 'Cancel stale PR runs'
    dependsOn: [ ]
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job:
        displayName: 'Cancel stale PR runs'
        timeoutInMinutes: 5   # belt-and-suspenders: never let this step itself stall the pipeline
        steps:
          - checkout: self
            fetchDepth: 1
          - script: ci/stale-azure-pipeline-runs-canceler.sh
            displayName: 'Cancel older runs for this PR'
            env:
              AZURE_BUILDS_API_TOKEN: $(System.AccessToken)

  # One-shot HOST-disk recon. INERT unless queued (Manual) with parameter runDiskProbe=true. BARE (no
  # container:) so `du` sees the Azure VM host fs, not the ror-toolchains overlay. Prints a ranked
  # chart of fat dirs that sit on docker's device, then `exit 1` to end the build immediately —
  # this is recon, not a real run. Use it to decide which dirs a `target: host` reclaim step removes.
  - ${{ if eq(parameters.runDiskProbe, true) }}:
    - stage: DISK_PROBE
      displayName: 'Host disk probe (recon, self-killing)'
      dependsOn: [ ]
      jobs:
      - job: PROBE
        timeoutInMinutes: 10
        steps:
          - checkout: self
            fetchDepth: 1
          - bash: bash ci/probe-host-disk.sh
            displayName: 'Probe + rank fat dirs on docker device, then kill build'

  - stage: ES_S3_UP
    displayName: 'Upload missing ROR ES dependencies'
    dependsOn: [ SUPERSEDE_GUARD ]
    condition: and(not(canceled()), in(dependencies.SUPERSEDE_GUARD.result, 'Succeeded', 'Skipped'), notIn(variables['Build.Reason'], 'Manual', 'Schedule'), eq(variables.isNewEsBranchOrPr, true))
    jobs:
      - job:
        steps:
          - script: |
              export ROR_ARTIFACTS_STORE_ENDPOINT_URL=$VAR_ROR_ARTIFACTS_STORE_ENDPOINT_URL
              export ROR_ARTIFACTS_STORE_REGION=$VAR_ROR_ARTIFACTS_STORE_REGION
              export ROR_ARTIFACTS_STORE_ACCESS_KEY_ID=$VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_ID
              export ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET
              export ROR_ARTIFACTS_STORE_BUCKET=$VAR_ROR_ARTIFACTS_STORE_BUCKET
              export ROR_ARTIFACTS_STORE_PATH_PREFIX=$VAR_ROR_ARTIFACTS_STORE_PATH_PREFIX
              export ROR_LIBS_STORE_ENDPOINT_URL=$VAR_ROR_LIBS_STORE_ENDPOINT_URL
              export ROR_LIBS_STORE_REGION=$VAR_ROR_LIBS_STORE_REGION
              export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
              export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET
              export ROR_LIBS_STORE_BUCKET=$VAR_ROR_LIBS_STORE_BUCKET
              export ROR_LIBS_STORE_PATH_PREFIX=$VAR_ROR_LIBS_STORE_PATH_PREFIX

              ci/upload-es-artifacts.sh
            continueOnError: true
            env:
              VAR_ROR_ARTIFACTS_STORE_ENDPOINT_URL: $(ROR_ARTIFACTS_STORE_ENDPOINT_URL)
              VAR_ROR_ARTIFACTS_STORE_REGION: $(ROR_ARTIFACTS_STORE_REGION)
              VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_ID: $(ROR_ARTIFACTS_STORE_ACCESS_KEY_ID)
              VAR_ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET: $(ROR_ARTIFACTS_STORE_ACCESS_KEY_SECRET)
              VAR_ROR_ARTIFACTS_STORE_BUCKET: $(ROR_ARTIFACTS_STORE_BUCKET)
              VAR_ROR_ARTIFACTS_STORE_PATH_PREFIX: $(ROR_ARTIFACTS_STORE_PATH_PREFIX)
              VAR_ROR_LIBS_STORE_ENDPOINT_URL: $(ROR_LIBS_STORE_ENDPOINT_URL)
              VAR_ROR_LIBS_STORE_REGION: $(ROR_LIBS_STORE_REGION)
              VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
              VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
              VAR_ROR_LIBS_STORE_BUCKET: $(ROR_LIBS_STORE_BUCKET)
              VAR_ROR_LIBS_STORE_PATH_PREFIX: $(ROR_LIBS_STORE_PATH_PREFIX)

  # Builds & pushes the CI toolchains image (ci/toolchains/JdkToolchains.Dockerfile). Runs on the
  # weekly schedule (cache refresh) or manually with actionToPerform=build_toolchains_image after a
  # JDK/Gradle change (then bump the image tag in the `resources.containers` block above).
  - stage: BUILD_TOOLCHAINS_IMAGE
    displayName: 'Build & push CI toolchains image'
    # Deliberately NOT gated on SUPERSEDE_GUARD: this stage only fires on Schedule/Manual (never a
    # PR run, per the condition below), so it can never race a PR supersede — by design.
    dependsOn: [ ]
    condition:
      or(
        eq(variables['Build.Reason'], 'Schedule'),
        and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'build_toolchains_image'))
      )
    jobs:
      - job: BUILD_AND_PUSH
        timeoutInMinutes: 240
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
          - bash: |
              sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache
              docker system prune -af
              df -h /
            displayName: 'Free up disk space'
          - script: |
              set -e
              # The image tag lives in the resources.containers block of this file (single source of truth)
              IMAGE=$(grep -oE 'beshultd/ror-ci-toolchains:[^ ]+' azure-pipelines.yml | head -1)
              echo ">>> Building $IMAGE"
              docker build -f ci/toolchains/JdkToolchains.Dockerfile -t "$IMAGE" .
              echo "$var_docker_registry_password" | docker login -u "$var_docker_registry_user" --password-stdin
              docker push "$IMAGE"
            displayName: 'docker build & push'
            env:
              var_docker_registry_user: $(DOCKER_REGISTRY_USER)
              var_docker_registry_password: $(DOCKER_REGISTRY_PASSWORD)

  - stage: TOOLCHAINS_VERIFY
    displayName: 'Verify toolchains image'
    dependsOn: [ SUPERSEDE_GUARD ]
    condition:
      and(
        not(canceled()),
        in(dependencies.SUPERSEDE_GUARD.result, 'Succeeded', 'Skipped'),
        or(
          notIn(variables['Build.Reason'], 'Manual', 'Schedule'),
          and(eq(variables['Build.Reason'], 'Manual'), startsWith('${{ parameters.actionToPerform }}', 'run_all_tests')),
          and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'release_without_testing'))
        )
      )
    jobs:
      - job: TOOLCHAINS_VERIFY
        displayName: 'Verify baked Gradle home and toolchains'
        container: ror-toolchains
        timeoutInMinutes: 10
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
          # Verify the baked Gradle home is present/usable (failure => rebuild the image). No --offline:
          # a stale cache must fall back to the network in the test jobs, not block the whole pipeline here.
          - bash: |
              set -e
              echo "Baked GRADLE_USER_HOME=$GRADLE_USER_HOME"
              ls "$GRADLE_USER_HOME/wrapper/dists" || { echo "No baked Gradle dist in image"; exit 1; }
              ./gradlew --no-daemon -q help
            displayName: 'Verify baked Gradle home'
            env:
              GRADLE_USER_HOME: $(GRADLE_USER_HOME)

  - stage: OPTIONAL_CHECKS
    displayName: 'Optional checks'
    dependsOn: [ SUPERSEDE_GUARD, ES_S3_UP, TOOLCHAINS_VERIFY ]
    # not(canceled()) FIRST: a custom condition suppresses Azure's implicit cancellation check, so
    # without it this stage starts/continues even after the run is canceled (the cancel-livelock).
    # SUPERSEDE_GUARD gate: when this PR run is superseded the guard FAILS (exit 1), so the heavy
    # stages must not run. Succeeded = newest PR run; Skipped = non-PR run (guard didn't apply).
    condition: and(not(canceled()), in(dependencies.SUPERSEDE_GUARD.result, 'Succeeded', 'Skipped'), in(dependencies.ES_S3_UP.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'), in(dependencies.TOOLCHAINS_VERIFY.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'), notIn(variables['Build.Reason'], 'Manual', 'Schedule'))
    jobs:
      - job: CVE_CHECK
        # TEMPORARILY DISABLED — re-enable when https://github.com/sscarduzio/elasticsearch-readonlyrest-plugin/pull/1275 is done
        condition: false
        container: ror-toolchains
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
            persistCredentials: true
          - task: Cache@2
            displayName: 'Restore CVE DB from cache'
            inputs:
              key: '$(dependencyCheckCacheKey)'
              # prefix fallback to any prior cache entry
              restoreKeys: dependency-check-v1-
              path: $(dependencyCheckDataDir)
          - script: |
              echo "[OPTIONAL_CHECKS] executing ROR_TASK=$ROR_TASK"

              export DEPENDENCY_CHECK_DATA_DIR=$var_dependency_check_data_dir

              if [ "$var_is_fork" = "False" ]; then
                # Export API key only when PR is from the same repo; forks do not get secrets.
                # Using the wrong API key breaks the CVE check.

                export NVD_API_KEY=$var_nvd_api_key
                export OSS_INDEX_USERNAME=$var_oss_index_username
                export OSS_INDEX_PASSWORD=$var_oss_index_password
              fi

              ci/run-pipeline.sh
            continueOnError: true
            env:
              ROR_TASK: cve_check
              var_nvd_api_key: $(NVD_API_KEY)
              var_dependency_check_data_dir: $(dependencyCheckDataDir)
              var_is_fork: $(System.PullRequest.IsFork)
              var_oss_index_username: $(OSS_INDEX_USERNAME)
              var_oss_index_password: $(OSS_INDEX_PASSWORD)
              GRADLE_USER_HOME: $(GRADLE_USER_HOME)
          - task: Cache@2
            displayName: 'Save updated CVE DB in cache'
            inputs:
              # Cache entries are immutable, a new write will only occur when a new key appears
              key: '$(dependencyCheckCacheKey)'
              path: $(dependencyCheckDataDir)
            condition: succeeded()

  - stage: REQUIRED_CHECKS
    displayName: 'Required checks'
    dependsOn: [ SUPERSEDE_GUARD, ES_S3_UP, TOOLCHAINS_VERIFY ]
    condition:
      and(
        not(canceled()),
        in(dependencies.SUPERSEDE_GUARD.result, 'Succeeded', 'Skipped'),
        in(dependencies.ES_S3_UP.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'),
        in(dependencies.TOOLCHAINS_VERIFY.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'),
        notIn(variables['Build.Reason'], 'Manual', 'Schedule')
      )
    jobs:
      - job:
        container: ror-toolchains
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
            persistCredentials: true
          - script: |
              export ROR_LIBS_STORE_ENDPOINT_URL=$VAR_ROR_LIBS_STORE_ENDPOINT_URL
              export ROR_LIBS_STORE_REGION=$VAR_ROR_LIBS_STORE_REGION
              export ROR_LIBS_STORE_ACCESS_KEY_ID=$VAR_ROR_LIBS_STORE_ACCESS_KEY_ID
              export ROR_LIBS_STORE_ACCESS_KEY_SECRET=$VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET
              export ROR_LIBS_STORE_BUCKET=$VAR_ROR_LIBS_STORE_BUCKET
              export ROR_LIBS_STORE_PATH_PREFIX=$VAR_ROR_LIBS_STORE_PATH_PREFIX

              echo "[REQUIRED_CHECKS] executing ROR_TASK = $ROR_TASK"
              ci/run-pipeline.sh
            env:
              GRADLE_USER_HOME: $(GRADLE_USER_HOME)
              VAR_ROR_LIBS_STORE_ENDPOINT_URL: $(ROR_LIBS_STORE_ENDPOINT_URL)
              VAR_ROR_LIBS_STORE_REGION: $(ROR_LIBS_STORE_REGION)
              VAR_ROR_LIBS_STORE_ACCESS_KEY_ID: $(ROR_LIBS_STORE_ACCESS_KEY_ID)
              VAR_ROR_LIBS_STORE_ACCESS_KEY_SECRET: $(ROR_LIBS_STORE_ACCESS_KEY_SECRET)
              VAR_ROR_LIBS_STORE_BUCKET: $(ROR_LIBS_STORE_BUCKET)
              VAR_ROR_LIBS_STORE_PATH_PREFIX: $(ROR_LIBS_STORE_PATH_PREFIX)
        strategy:
          maxParallel: 99
          matrix:
            LICENSE_CHECK:
              ROR_TASK: license_check
            COMPILE_CODEBASE_CHECK:
              ROR_TASK: compile_codebase_check
            AUDIT_BUILD_CHECK:
              ROR_TASK: audit_build_check
            FORMAT_CODE_CHECK:
              ROR_TASK: format_code_check

  - stage: TEST
    displayName: 'Run all tests'
    dependsOn: [ SUPERSEDE_GUARD, ES_S3_UP, TOOLCHAINS_VERIFY ]
    condition:
      and(
        not(canceled()),
        in(dependencies.SUPERSEDE_GUARD.result, 'Succeeded', 'Skipped'),
        in(dependencies.ES_S3_UP.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'),
        in(dependencies.TOOLCHAINS_VERIFY.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'),
        or(
          notIn(variables['Build.Reason'], 'Manual', 'Schedule'),
          and(eq(variables['Build.Reason'], 'Manual'), startsWith('${{ parameters.actionToPerform }}', 'run_all_tests'))
        )
      )
    jobs:
####################################
##### Unit tests
####################################
      - job: UNIT
        condition:
          and(
            succeeded(),
            not(and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'run_all_tests_on_windows')))
          )
        displayName: 'Unit tests'
        container: ror-toolchains
        timeoutInMinutes: 30
        steps:
          - checkout: self
            fetchDepth: 1
            clean: false
            persistCredentials: true
          - script: |
              # core_tests starts testcontainers too (LDAP/WireMock) — same Docker Hub rate limit as IT.
              source ci/docker-hub-auth.sh
              echo "[TEST] executing ROR_TASK = $ROR_TASK"
              ci/run-pipeline.sh
            env:
              ROR_TASK: core_tests
              GRADLE_USER_HOME: $(GRADLE_USER_HOME)
              DOCKER_HUB_USER: $(DOCKER_HUB_USER)
              DOCKER_HUB_RO_TOKEN: $(DOCKER_HUB_RO_TOKEN)
          - task: PublishTestResults@2
            condition: failed()
            inputs:
              testRunTitle: "$(ROR_TASK) results"
              testResultsFiles: "**/TEST*xml"
              mergeTestResults: true

#######################################################
##### Integration tests for ES 9.x on master/develop
#######################################################
      - job:
        condition:
          and(
            succeeded(),
            or(
              eq(variables.isEpicBranchOrPr, true),
              eq(variables.isDevelop, true),
              eq(variables.isMaster, true),
              and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'run_all_tests_on_linux'))
            )
          )
        container: ror-toolchains
        timeoutInMinutes: 120
        # Bounded cancel grace: on timeout/supersede Azure SIGTERMs the step; run-pipeline.sh's trap
        # kills the gradle process tree + reaps this leg's containers within this window. Without a
        # killable tree (the old bug) legs ran 300+ min; this makes the 120-min timeout enforceable.
        cancelTimeoutInMinutes: 5
        steps:
          - template: ci/azure-templates/integration-test-steps.yml
        strategy:
          maxParallel: 99
          matrix:
            IT_es94x:
              ROR_TASK: integration_es94x
            IT_es92x:
              ROR_TASK: integration_es92x
            IT_es91x:
              ROR_TASK: integration_es91x
            IT_es90x:
              ROR_TASK: integration_es90x

#######################################################
##### Integration tests for ES 8.x on master/develop
#######################################################
      - job:
        condition:
          and(
            succeeded(),
            or(
              eq(variables.isEpicBranchOrPr, true),
              eq(variables.isDevelop, true),
              eq(variables.isMaster, true),
              and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'run_all_tests_on_linux'))
            )
          )
        container: ror-toolchains
        timeoutInMinutes: 120
        # Bounded cancel grace: on timeout/supersede Azure SIGTERMs the step; run-pipeline.sh's trap
        # kills the gradle process tree + reaps this leg's containers within this window. Without a
        # killable tree (the old bug) legs ran 300+ min; this makes the 120-min timeout enforceable.
        cancelTimeoutInMinutes: 5
        steps:
          - template: ci/azure-templates/integration-test-steps.yml
        strategy:
          maxParallel: 99
          matrix:
            IT_es818x:
              ROR_TASK: integration_es818x
            IT_es816x:
              ROR_TASK: integration_es816x
            IT_es815x:
              ROR_TASK: integration_es815x
            IT_es814x:
              ROR_TASK: integration_es814x
            IT_es813x:
              ROR_TASK: integration_es813x
            IT_es812x:
              ROR_TASK: integration_es812x
            IT_es811x:
              ROR_TASK: integration_es811x
            IT_es810x:
              ROR_TASK: integration_es810x
            IT_es89x:
              ROR_TASK: integration_es89x
            IT_es88x:
              ROR_TASK: integration_es88x
            IT_es87x:
              ROR_TASK: integration_es87x
            IT_es85x:
              ROR_TASK: integration_es85x
            IT_es84x:
              ROR_TASK: integration_es84x
            IT_es83x:
              ROR_TASK: integration_es83x
            IT_es82x:
              ROR_TASK: integration_es82x
            IT_es81x:
              ROR_TASK: integration_es81x
            IT_es80x:
              ROR_TASK: integration_es80x

#######################################################
##### Integration tests for ES <= 7.x on master/develop
#######################################################
      - job:
        condition:
          and(
            succeeded(),
            or(
              eq(variables.isEpicBranchOrPr, true),
              eq(variables.isDevelop, true),
              eq(variables.isMaster, true),
              and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.actionToPerform }}', 'run_all_tests_on_linux'))
            )
          )
        container: ror-toolchains
        timeoutInMinutes: 120
        # Bounded cancel grace: on timeout/supersede Azure SIGTERMs the step; run-pipeline.sh's trap
        # kills the gradle process tree + reaps this leg's containers within this window. Without a
        # killable tree (the old bug) legs ran 300+ min; this makes the 120-min timeout enforceable.
        cancelTimeoutInMinutes: 5
        steps:
          - template: ci/azure-templates/integration-test-steps.yml
        strategy:
          maxParallel: 99
          matrix:
            IT_es717x:
              ROR_TASK: integration_es717x
            IT_es716x:
              ROR_TASK: integration_es716x
            IT_es714x:
              ROR_TASK: integration_es714x
            IT_es711x:
              ROR_TASK: integration_es711x
            IT_es710x:
              ROR_TASK: integration_es710x
            IT_es79x:
              ROR_TASK: integration_es79x
            IT_es78x:
              ROR_TASK: integration_es78x
            IT_es77x:
              ROR_TASK: integration_es77x
            IT_es74x:
              ROR_TASK: integration_es74x
            IT_es73x:
              ROR_TASK: integration_es73x
            IT_es72x:
              ROR_TASK: integration_es72x
            IT_es70x:
              ROR_TASK: integration_es70x
            IT_es67x:
              ROR_TASK: integration_es67x

#######################################################
##### Integration tests for ES 9.x on PRs
#######################################################
      - job:
        condition:
          and(
            succeeded(),
            ne(variables.isEpicBranchOrPr, true),
            ne(variables.isDevelop, true),
            ne(variables.isMaster, true),
            not(and(eq(variables['Build.Reason'], 'Manual'), startsWith('${{ parameters.actionToPerform }}', 'run_all_tests')))
          )
        container: ror-toolchains
        timeoutInMinutes: 120
        # Bounded cancel grace: on timeout/supersede Azure SIGTERMs the step; run-pipeline.sh's trap
        # kills the gradle process tree + reaps this leg's containers within this window. Without a
        # killable tree (the old bug) legs ran 300+ min; this makes the 120-min timeout enforceable.
        cancelTimeoutInMinutes: 5
        steps:
          - template: ci/azure-templates/integration-test-steps.yml
        strategy:
          maxParallel: 99
          matrix:
            IT_es94x:
